<!DOCTYPE html>
<html lang="en" class="dark" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama Fragmenter v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --brand-primary: #3b82f6;
            --transition-speed: 0.3s;
        }

        /* Theme Variables */
        .dark {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-header: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
        }

        .light {
            --bg-main: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-header: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        .sidebar {
            background-color: var(--bg-sidebar);
            border-color: var(--border-color);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .letterbox-overlay {
            background: rgba(0, 0, 0, 0.9);
            pointer-events: none;
        }

        input[type="range"] {
            @apply h-1.5 rounded-lg appearance-none cursor-pointer accent-blue-500;
            background-color: var(--border-color);
        }

        /* Improved Numerical Inputs */
        .num-input {
            @apply border rounded-md px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all w-20 text-center font-bold;
            background-color: var(--input-bg);
            border-color: var(--border-color);
            color: var(--brand-primary);
        }

        .btn-ratio {
            @apply border rounded-md py-2.5 text-xs font-bold transition-all text-slate-500;
            background-color: var(--input-bg);
            border-color: var(--border-color);
        }

        .dark .btn-ratio { @apply text-slate-400; }
        .light .btn-ratio { @apply text-slate-600; }

        .btn-ratio.active-ratio {
            @apply bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-500/20;
        }

        .fragment-preview {
            aspect-ratio: var(--preview-ratio);
            @apply rounded-lg border shadow-xl transition-transform hover:scale-[1.05] relative overflow-hidden;
            background-color: var(--input-bg);
            border-color: var(--border-color);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-500/20 rounded-full hover:bg-slate-500/40; }

        .viewfinder-border {
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1), 0 20px 50px rgba(0,0,0,0.3);
        }
        
        .theme-toggle-node {
            @apply w-10 h-5 rounded-full relative transition-colors duration-300 cursor-pointer border;
            background-color: var(--input-bg);
            border-color: var(--border-color);
        }
        .theme-toggle-thumb {
            @apply absolute top-0.5 left-0.5 w-3.5 h-3.5 rounded-full transition-transform duration-300 flex items-center justify-center bg-blue-500;
        }
        .dark .theme-toggle-thumb { transform: translateX(1.25rem); }
    </style>
</head>
<body class="flex flex-col">

    <!-- HEADER -->
    <header class="h-14 border-b flex items-center justify-between px-6 z-50 transition-colors duration-300" style="background-color: var(--bg-header); border-color: var(--border-color);">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 bg-blue-600 rounded flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-sm font-black tracking-tighter uppercase italic" style="color: var(--text-main)">Fragmenter</h1>
        </div>
        
        <div class="flex items-center gap-6">
            <!-- Theme Toggle -->
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold uppercase tracking-widest opacity-50">Theme</span>
                <div id="theme-toggle" class="theme-toggle-node">
                    <div class="theme-toggle-thumb">
                        <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-slate-500" id="status-indicator"></span>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Idle</span>
            </div>
        </div>
    </header>

    <!-- LANDING / DROPZONE -->
    <div id="landing-zone" class="absolute inset-0 z-40 flex flex-col items-center justify-center transition-opacity duration-500" style="background-color: var(--bg-main)">
        <label for="file-upload" class="border-2 border-dashed rounded-3xl p-16 flex flex-col items-center cursor-pointer hover:border-blue-500 transition-all group max-w-lg w-full" style="background-color: var(--bg-sidebar); border-color: var(--border-color)">
            <div class="w-16 h-16 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
            <span class="text-xl font-bold" style="color: var(--text-main)">Import Source File</span>
            <span class="text-sm mt-2" style="color: var(--text-muted)">Drop high-res panorama here</span>
            <input type="file" id="file-upload" class="hidden" accept="image/*">
        </label>
    </div>

    <!-- MAIN INTERFACE -->
    <main class="flex-1 flex overflow-hidden hidden" id="main-interface">
        
        <!-- LEFT SIDEBAR: CONTROLS -->
        <aside class="sidebar w-72 border-r flex flex-col overflow-y-auto p-5 gap-6 shadow-2xl">
            <section>
                <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Geometry</h2>
                
                <!-- Slices -->
                <div class="mb-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold opacity-80">Slice Count</span>
                        <input type="number" id="slice-input" min="2" max="10" value="3" class="num-input">
                    </div>
                    <input type="range" id="slice-range" min="2" max="10" value="3" class="w-full">
                </div>

                <!-- Rotation -->
                <div class="mb-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold opacity-80">Rotation (deg)</span>
                        <input type="number" id="rot-input" step="0.5" value="0" class="num-input">
                    </div>
                    <input type="range" id="rot-range" min="-15" max="15" step="0.5" value="0" class="w-full">
                </div>

                <!-- Zoom -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold opacity-80">Zoom</span>
                        <input type="number" id="zoom-input" step="0.01" min="0.1" max="5" value="1.00" class="num-input">
                    </div>
                    <input type="range" id="zoom-range" min="0.1" max="3" step="0.01" value="1" class="w-full">
                </div>
            </section>

            <section>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">Frame Aspect</h2>
                    <button id="flip-ratio-btn" class="p-1.5 hover:bg-blue-500/10 rounded-md transition-colors" title="Switch Orientation">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                        </svg>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button class="ratio-btn btn-ratio" data-ratio="0.8">4:5</button>
                    <button class="ratio-btn btn-ratio active-ratio" data-ratio="1">1:1</button>
                    <button class="ratio-btn btn-ratio" data-ratio="1.777">16:9</button>
                    <button class="ratio-btn btn-ratio" data-ratio="auto">AUTO</button>
                </div>
            </section>

            <section>
                <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Overlay</h2>
                <div class="space-y-2">
                    <label class="flex items-center justify-between p-2.5 rounded-lg bg-slate-500/5 cursor-pointer border border-transparent hover:border-blue-500/30 transition-all">
                        <span class="text-[11px] font-bold opacity-70">Safe Zones</span>
                        <input type="checkbox" id="toggle-safe-zones" class="accent-blue-500 w-4 h-4">
                    </label>
                    <label class="flex items-center justify-between p-2.5 rounded-lg bg-slate-500/5 cursor-pointer border border-transparent hover:border-blue-500/30 transition-all">
                        <span class="text-[11px] font-bold opacity-70">Slices</span>
                        <input type="checkbox" id="toggle-grid" checked class="accent-blue-500 w-4 h-4">
                    </label>
                </div>
            </section>

            <div class="mt-auto pt-4 border-t" style="border-color: var(--border-color)">
                <button id="export-btn" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-500/30 hover:bg-blue-500 hover:scale-[0.98] active:scale-95 transition-all flex flex-col items-center justify-center leading-tight">
                    <span class="text-sm">BATCH EXPORT</span>
                    <span class="text-[9px] opacity-70">DIRECT JPEG SEQUENCE</span>
                </button>
            </div>
        </aside>

        <!-- CENTER: VISUAL WORKSPACE -->
        <section class="flex-1 relative overflow-hidden flex items-center justify-center cursor-move" id="workspace" style="background-color: var(--bg-main)">
            <!-- Viewport Container -->
            <div id="viewfinder-container" class="relative z-10 transition-all duration-300">
                <!-- Overlays -->
                <div id="top-letterbox" class="letterbox-overlay absolute w-[10000px] h-[5000px] left-[-5000px] bottom-full"></div>
                <div id="bottom-letterbox" class="letterbox-overlay absolute w-[10000px] h-[5000px] left-[-5000px] top-full"></div>
                
                <!-- Viewfinder Content -->
                <div id="viewfinder" class="relative overflow-hidden bg-white viewfinder-border">
                    <!-- Image layer -->
                    <img id="main-image" src="" class="absolute max-w-none origin-center pointer-events-none select-none">
                    
                    <!-- Guides -->
                    <div id="slice-guides" class="absolute inset-0 flex pointer-events-none transition-opacity duration-300"></div>
                    
                    <!-- Social Media Safe Zones -->
                    <div id="safe-zones" class="absolute inset-0 hidden pointer-events-none opacity-50">
                        <div class="absolute right-4 bottom-32 flex flex-col gap-6">
                            <div class="w-10 h-10 rounded-full border border-white/20 bg-white/5 backdrop-blur-sm"></div>
                            <div class="w-10 h-10 rounded-full border border-white/20 bg-white/5 backdrop-blur-sm"></div>
                            <div class="w-10 h-10 rounded-full border border-white/20 bg-white/5 backdrop-blur-sm"></div>
                        </div>
                        <div class="absolute bottom-6 left-6 right-16 h-10 border border-white/20 bg-white/5 backdrop-blur-sm rounded"></div>
                    </div>
                </div>
            </div>

            <!-- Coordinate Tooltip -->
            <div class="absolute bottom-6 right-6 px-3 py-1.5 rounded border font-mono text-[10px] font-bold text-blue-500" style="background-color: var(--bg-sidebar); border-color: var(--border-color)">
                POS: <span id="coords">X:0 Y:0</span>
            </div>
        </section>

        <!-- RIGHT SIDEBAR: FRAGMENT OUTPUT -->
        <aside class="w-56 sidebar border-l flex flex-col">
            <div class="p-4 border-b flex items-center justify-between" style="border-color: var(--border-color)">
                <span class="text-[10px] font-black opacity-50 uppercase tracking-widest">Live Buffer</span>
                <span id="fragment-count" class="text-[10px] px-1.5 py-0.5 bg-blue-500 text-white rounded font-bold">0</span>
            </div>
            <div id="previews-container" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Previews -->
            </div>
        </aside>
    </main>

    <script>
        // --- STATE ---
        const state = {
            image: null,
            fileName: 'panorama',
            imgW: 0,
            imgH: 0,
            posX: 0,
            posY: 0,
            zoom: 1,
            rotation: 0,
            slices: 3,
            ratio: 1,
            isDragging: false,
            startX: 0,
            startY: 0,
            viewfinderW: 0,
            viewfinderH: 0
        };

        const elements = {
            htmlRoot: document.getElementById('root-html'),
            themeToggle: document.getElementById('theme-toggle'),
            landing: document.getElementById('landing-zone'),
            main: document.getElementById('main-interface'),
            fileInput: document.getElementById('file-upload'),
            mainImg: document.getElementById('main-image'),
            viewfinder: document.getElementById('viewfinder'),
            sliceRange: document.getElementById('slice-range'),
            sliceInput: document.getElementById('slice-input'),
            rotRange: document.getElementById('rot-range'),
            rotInput: document.getElementById('rot-input'),
            zoomRange: document.getElementById('zoom-range'),
            zoomInput: document.getElementById('zoom-input'),
            workspace: document.getElementById('workspace'),
            sliceGuides: document.getElementById('slice-guides'),
            previews: document.getElementById('previews-container'),
            coordDisplay: document.getElementById('coords'),
            toggleSafe: document.getElementById('toggle-safe-zones'),
            safeZones: document.getElementById('safe-zones'),
            toggleGrid: document.getElementById('toggle-grid'),
            exportBtn: document.getElementById('export-btn'),
            flipBtn: document.getElementById('flip-ratio-btn'),
            fragmentCount: document.getElementById('fragment-count'),
            statusIndicator: document.getElementById('status-indicator')
        };

        // --- THEME ---
        elements.themeToggle.addEventListener('click', () => {
            const isDark = elements.htmlRoot.classList.contains('dark');
            if (isDark) {
                elements.htmlRoot.classList.replace('dark', 'light');
            } else {
                elements.htmlRoot.classList.replace('light', 'dark');
            }
        });

        // --- INIT ---
        elements.fileInput.addEventListener('change', handleFile);
        
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Strip extension for filename logic
            state.fileName = file.name.replace(/\.[^/.]+$/, "");

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    state.image = img;
                    state.imgW = img.width;
                    state.imgH = img.height;
                    elements.mainImg.src = event.target.result;
                    
                    elements.landing.classList.add('opacity-0');
                    setTimeout(() => {
                        elements.landing.style.display = 'none';
                        elements.main.classList.remove('hidden');
                        elements.statusIndicator.classList.replace('bg-slate-500', 'bg-emerald-500');
                        document.querySelector('#status-indicator + span').innerText = 'Active';
                        initViewfinder();
                    }, 500);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function initViewfinder() {
            updateRatio(1); 
            state.posX = (state.viewfinderW - state.imgW) / 2;
            state.posY = (state.viewfinderH - state.imgH) / 2;
            updateTransform();
            updatePreviews();
        }

        // --- INPUT SYNC HELPERS ---
        function syncInputs(range, input, key, callback) {
            range.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                state[key] = val;
                input.value = val.toFixed(key === 'rotation' ? 1 : (key === 'zoom' ? 2 : 0));
                callback();
            });
            input.addEventListener('change', (e) => {
                let val = parseFloat(e.target.value);
                if (isNaN(val)) val = state[key];
                
                // Constraints
                if (key === 'slices') val = Math.max(2, Math.min(10, val));
                
                state[key] = val;
                range.value = val;
                callback();
            });
        }

        syncInputs(elements.sliceRange, elements.sliceInput, 'slices', () => {
            elements.fragmentCount.innerText = state.slices;
            updateRatio(state.ratio);
        });
        syncInputs(elements.rotRange, elements.rotInput, 'rotation', () => {
            updateTransform();
            updatePreviews();
        });
        syncInputs(elements.zoomRange, elements.zoomInput, 'zoom', () => {
            updateTransform();
            updatePreviews();
        });

        // --- CONTROLS ---
        document.querySelectorAll('.ratio-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active-ratio'));
                btn.classList.add('active-ratio');
                const r = btn.dataset.ratio;
                if (r === 'auto') {
                    updateRatio(state.imgW / (state.imgH / state.slices));
                } else {
                    updateRatio(parseFloat(r));
                }
            });
        });

        elements.flipBtn.addEventListener('click', () => {
            if (state.ratio === 'auto') return;
            updateRatio(1 / state.ratio);
        });

        elements.toggleSafe.addEventListener('change', (e) => {
            elements.safeZones.style.display = e.target.checked ? 'block' : 'none';
        });

        elements.toggleGrid.addEventListener('change', (e) => {
            elements.sliceGuides.style.opacity = e.target.checked ? '1' : '0';
        });

        function updateRatio(ratio) {
            state.ratio = ratio;
            const containerWidth = elements.workspace.clientWidth * 0.8;
            const containerHeight = elements.workspace.clientHeight * 0.8;

            let totalW = containerWidth;
            let singleSliceW = totalW / state.slices;
            let h = singleSliceW / state.ratio;

            if (h > containerHeight) {
                h = containerHeight;
                singleSliceW = h * state.ratio;
                totalW = singleSliceW * state.slices;
            }

            state.viewfinderW = totalW;
            state.viewfinderH = h;
            elements.viewfinder.style.width = totalW + 'px';
            elements.viewfinder.style.height = h + 'px';
            document.documentElement.style.setProperty('--preview-ratio', state.ratio);
            
            updateSliceGuides();
            updateTransform();
            updatePreviews();
        }

        // --- INTERACTION ---
        elements.workspace.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', endDrag);
        elements.workspace.addEventListener('touchstart', (e) => startDrag(e.touches[0]));
        window.addEventListener('touchmove', (e) => doDrag(e.touches[0]));
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            state.isDragging = true;
            state.startX = e.clientX - state.posX;
            state.startY = e.clientY - state.posY;
        }

        function doDrag(e) {
            if (!state.isDragging) return;
            state.posX = e.clientX - state.startX;
            state.posY = e.clientY - state.startY;
            updateTransform();
            updatePreviews();
        }

        function endDrag() { state.isDragging = false; }

        function updateTransform() {
            elements.mainImg.style.transform = `translate(${state.posX}px, ${state.posY}px) rotate(${state.rotation}deg) scale(${state.zoom})`;
            elements.coordDisplay.innerText = `X:${Math.round(state.posX)} Y:${Math.round(state.posY)}`;
        }

        function updateSliceGuides() {
            elements.sliceGuides.innerHTML = '';
            for (let i = 1; i < state.slices; i++) {
                const line = document.createElement('div');
                line.className = 'h-full border-r border-slate-500/20 border-dashed';
                line.style.width = (100 / state.slices) + '%';
                elements.sliceGuides.appendChild(line);
            }
        }

        // --- RENDER SYSTEM ---
        function renderSliceToCanvas(canvas, index, qualityScale = 1) {
            const sliceViewW = state.viewfinderW / state.slices;
            const sliceViewH = state.viewfinderH;

            canvas.width = sliceViewW * qualityScale;
            canvas.height = sliceViewH * qualityScale;
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#000";
            ctx.fillRect(0,0, canvas.width, canvas.height);

            ctx.save();
            ctx.scale(qualityScale, qualityScale);
            ctx.translate(-index * sliceViewW, 0);
            
            // Transform
            ctx.translate(state.posX + state.imgW/2, state.posY + state.imgH/2);
            ctx.rotate(state.rotation * Math.PI / 180);
            ctx.scale(state.zoom, state.zoom);
            ctx.drawImage(state.image, -state.imgW/2, -state.imgH/2, state.imgW, state.imgH);
            
            ctx.restore();
        }

        function updatePreviews() {
            if (!state.image) return;
            elements.previews.innerHTML = '';
            for (let i = 0; i < state.slices; i++) {
                const thumb = document.createElement('div');
                thumb.className = 'fragment-preview';
                const canvas = document.createElement('canvas');
                canvas.className = 'w-full h-full object-cover';
                renderSliceToCanvas(canvas, i, 0.5); 
                
                const label = document.createElement('div');
                label.className = 'absolute bottom-1 right-1 bg-blue-600 text-white text-[8px] px-1 rounded font-bold';
                label.innerText = i + 1;
                
                thumb.appendChild(canvas);
                thumb.appendChild(label);
                elements.previews.appendChild(thumb);
            }
        }

        // --- EXPORT ---
        elements.exportBtn.addEventListener('click', async () => {
            const sliceViewW = state.viewfinderW / state.slices;
            const captureScale = 2500 / sliceViewW; 

            for (let i = 0; i < state.slices; i++) {
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = sliceViewW * captureScale;
                exportCanvas.height = state.viewfinderH * captureScale;
                renderSliceToCanvas(exportCanvas, i, captureScale);
                
                const dataUrl = exportCanvas.toDataURL('image/jpeg', 0.95);
                const link = document.createElement('a');
                // Naming logic: originalName + sliceNumber
                link.download = `${state.fileName}_${(i+1)}.jpg`;
                link.href = dataUrl;
                link.click();
                
                await new Promise(r => setTimeout(r, 200));
            }
        });

        window.addEventListener('resize', () => {
            if (state.image) updateRatio(state.ratio);
        });
    </script>
</body>
</html>

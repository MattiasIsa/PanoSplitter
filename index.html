<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Panorama Splitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        /* True Black Dark Mode */
        .dark body { background-color: #000000; }
        .dark .bg-card { background-color: #0a0a0a; }
        .dark .border-custom { border-color: #1a1a1a; }
        
        .canvas-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }
        .light .canvas-container { background: #f3f4f6; }
        .dark .canvas-container { background: #050505; }
        
        canvas {
            max-width: 100%;
            height: auto !important; /* Ensure canvas fits container width */
            display: block;
        }

        /* Large panoramas still need to scroll horizontally if they are super wide */
        .wide-canvas canvas {
            max-width: none;
        }
        
        .drop-zone {
            transition: all 0.3s ease;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .dark .drop-zone.drag-over {
            background-color: #0f172a;
        }

        /* Custom scrollbar for better dark mode aesthetic */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }
        .light ::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-black min-h-screen font-sans text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <div class="max-w-7xl mx-auto px-4 py-6 md:py-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 dark:text-white mb-1">PanoSplitter</h1>
                <p class="text-gray-600 dark:text-gray-400 text-sm md:text-base">Professional seamless carousel generator for Instagram.</p>
            </div>
            <button id="themeToggle" class="p-2.5 rounded-full bg-gray-200 dark:bg-zinc-800 hover:ring-4 hover:ring-gray-300 dark:hover:ring-zinc-700 transition-all">
                <span id="themeIcon">
                    <svg id="sunIcon" class="w-5 h-5 md:w-6 md:h-6 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="moonIcon" class="hidden w-5 h-5 md:w-6 md:h-6 text-gray-700" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </span>
            </button>
        </header>

        <!-- Upload Section -->
        <div id="uploadSection" class="bg-white dark:bg-zinc-950 p-6 md:p-12 rounded-2xl shadow-sm border border-gray-200 dark:border-zinc-800 text-center transition-colors">
            <div id="dropZone" class="drop-zone border-2 border-dashed border-gray-300 dark:border-zinc-700 rounded-xl p-8 md:p-20 cursor-pointer hover:border-blue-500">
                <div class="flex flex-col items-center">
                    <div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-full mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <p class="text-xl font-bold text-gray-800 dark:text-gray-100">Drop your panorama here</p>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">or click to browse from files</p>
                </div>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
            </div>
        </div>

        <!-- Editor Section -->
        <div id="editorSection" class="hidden space-y-6">
            <!-- Controls Card -->
            <div class="bg-white dark:bg-zinc-950 p-5 md:p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-zinc-800">
                <div class="flex flex-col gap-6">
                    <!-- Top Row: Configs -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-3">Slices Count</label>
                            <div class="flex items-center space-x-4">
                                <input type="range" id="sliceRange" min="2" max="10" value="3" class="flex-1 h-2 bg-gray-200 dark:bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-blue-600">
                                <span id="sliceCountDisplay" class="text-xl font-black text-blue-600 w-8 text-center">3</span>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-2">Aspect Ratio</label>
                            <select id="ratioSelect" class="w-full p-3 bg-gray-50 dark:bg-zinc-900 border border-gray-300 dark:border-zinc-700 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="1">Square (1:1)</option>
                                <option value="0.8">Portrait (4:5)</option>
                                <option value="0.5625">Story (9:16)</option>
                                <option value="original">Original Height</option>
                            </select>
                        </div>

                        <div class="flex items-center space-x-3 bg-gray-50 dark:bg-zinc-900/50 p-3 rounded-xl border border-gray-100 dark:border-zinc-800/50">
                            <div class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="blurToggle" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-zinc-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                            </div>
                            <label for="blurToggle" class="text-sm font-semibold text-gray-700 dark:text-gray-300 cursor-pointer">Blurred Background</label>
                        </div>
                    </div>

                    <!-- Bottom Row: Actions -->
                    <div class="flex flex-col sm:flex-row items-stretch gap-3 border-t border-gray-100 dark:border-zinc-900 pt-6">
                        <button id="downloadZipBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white font-bold py-3.5 px-6 rounded-xl transition duration-200 shadow-lg shadow-blue-500/20 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            Download ZIP
                        </button>
                        <button id="downloadBatchBtn" class="flex-1 bg-zinc-800 hover:bg-zinc-700 active:scale-[0.98] text-white font-bold py-3.5 px-6 rounded-xl transition duration-200 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            Individual JPEGs
                        </button>
                        <button id="resetBtn" class="sm:flex-none px-6 py-3.5 bg-red-500/10 hover:bg-red-500/20 text-red-500 font-bold rounded-xl transition-all">
                            Reset
                        </button>
                    </div>
                </div>
            </div>

            <!-- Preview Card -->
            <div class="bg-white dark:bg-zinc-950 p-4 md:p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-zinc-800">
                <h3 class="text-sm font-bold uppercase tracking-widest text-gray-400 dark:text-zinc-500 mb-4 px-1">Live Split Preview</h3>
                <div id="canvasWrapper" class="canvas-container shadow-inner border border-gray-100 dark:border-zinc-900">
                    <canvas id="previewCanvas"></canvas>
                </div>
            </div>

            <!-- Individual Slices Grid -->
            <div>
                <h3 class="text-sm font-bold uppercase tracking-widest text-gray-400 dark:text-zinc-500 mb-4 px-1">Individual Slices</h3>
                <div id="slicesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Notification system -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:right-8 bg-blue-600 text-white px-6 py-3.5 rounded-2xl shadow-2xl translate-y-24 opacity-0 transition-all duration-300 z-50 font-bold flex items-center space-x-3 pointer-events-none">
        <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <span id="toastMsg">Processing...</span>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const uploadSection = document.getElementById('uploadSection');
        const editorSection = document.getElementById('editorSection');
        const sliceRange = document.getElementById('sliceRange');
        const sliceCountDisplay = document.getElementById('sliceCountDisplay');
        const ratioSelect = document.getElementById('ratioSelect');
        const blurToggle = document.getElementById('blurToggle');
        const previewCanvas = document.getElementById('previewCanvas');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const slicesGrid = document.getElementById('slicesGrid');
        const downloadZipBtn = document.getElementById('downloadZipBtn');
        const downloadBatchBtn = document.getElementById('downloadBatchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        let originalImage = null;
        let originalFileName = "panorama";
        let slicesDataUrls = [];

        // --- Theme ---
        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                document.getElementById('sunIcon').classList.add('hidden');
                document.getElementById('moonIcon').classList.remove('hidden');
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                document.getElementById('sunIcon').classList.remove('hidden');
                document.getElementById('moonIcon').classList.add('hidden');
            }
            if (originalImage) processImage();
        });

        // --- File Handling ---
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });

        // --- Editor Events ---
        sliceRange.addEventListener('input', (e) => {
            sliceCountDisplay.textContent = e.target.value;
            processImage();
        });
        ratioSelect.addEventListener('change', processImage);
        blurToggle.addEventListener('change', processImage);
        resetBtn.addEventListener('click', () => {
            if(confirm("Discard changes and start over?")) location.reload();
        });

        // --- Resizing logic ---
        window.addEventListener('resize', () => {
            if (originalImage) processImage();
        });

        // --- Downloads ---
        downloadZipBtn.addEventListener('click', async () => {
            if (slicesDataUrls.length === 0) return;
            downloadZipBtn.disabled = true;
            showToast("Packaging ZIP archive...");
            try {
                const zip = new JSZip();
                slicesDataUrls.forEach((url, index) => {
                    const imageData = url.split(',')[1];
                    zip.file(`${originalFileName}_slice_${index + 1}.jpg`, imageData, {base64: true});
                });
                const content = await zip.generateAsync({type: "blob"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${originalFileName}_carousel.zip`;
                link.click();
                showToast("ZIP ready!", true);
            } catch (err) {
                showToast("Error creating ZIP.");
            } finally {
                downloadZipBtn.disabled = false;
            }
        });

        downloadBatchBtn.addEventListener('click', () => {
            if (slicesDataUrls.length === 0) return;
            showToast("Starting batch download...");
            slicesDataUrls.forEach((url, index) => {
                setTimeout(() => {
                    const link = document.createElement('a');
                    link.download = `${originalFileName}_slice_${index + 1}.jpg`;
                    link.href = url;
                    link.click();
                    if(index === slicesDataUrls.length - 1) showToast("All JPEGs saved!", true);
                }, index * 400);
            });
        });

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;
            originalFileName = file.name.split('.').slice(0, -1).join('.') || "panorama";
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    uploadSection.classList.add('hidden');
                    editorSection.classList.remove('hidden');
                    processImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function processImage() {
            if (!originalImage) return;
            const sliceCount = parseInt(sliceRange.value);
            const ratioType = ratioSelect.value;
            const sliceWidth = originalImage.width / sliceCount;
            let sliceHeight = ratioType === 'original' ? originalImage.height : sliceWidth / parseFloat(ratioType);
            
            // Adjust canvas container scroll state
            if (originalImage.width > canvasWrapper.clientWidth) {
                canvasWrapper.classList.add('wide-canvas');
            } else {
                canvasWrapper.classList.remove('wide-canvas');
            }

            drawPreview(sliceCount, sliceWidth, sliceHeight);
            generateSlices(sliceCount, sliceWidth, sliceHeight);
        }

        function drawPreview(count, sliceW, sliceH) {
            const ctx = previewCanvas.getContext('2d');
            const totalW = sliceW * count;
            const totalH = Math.max(originalImage.height, sliceH);
            previewCanvas.width = totalW;
            previewCanvas.height = totalH;
            ctx.clearRect(0, 0, totalW, totalH);

            if (blurToggle.checked && sliceH > originalImage.height) {
                ctx.save();
                ctx.filter = 'blur(40px)';
                const scale = Math.max(totalW / originalImage.width, totalH / originalImage.height);
                const drawW = originalImage.width * scale;
                const drawH = originalImage.height * scale;
                ctx.drawImage(originalImage, (totalW - drawW) / 2, (totalH - drawH) / 2, drawW, drawH);
                ctx.restore();
                ctx.fillStyle = html.classList.contains('dark') ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.4)';
                ctx.fillRect(0,0, totalW, totalH);
            } else if (!html.classList.contains('dark')) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0,0, totalW, totalH);
            }

            const imgY = (totalH - originalImage.height) / 2;
            ctx.drawImage(originalImage, 0, imgY);

            // Grid Lines
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = Math.max(6, totalW / 300);
            ctx.setLineDash([20, 15]);
            for (let i = 1; i < count; i++) {
                ctx.beginPath();
                ctx.moveTo(i * sliceW, 0);
                ctx.lineTo(i * sliceW, totalH);
                ctx.stroke();
            }

            // Export Area Highlight
            ctx.setLineDash([]);
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 4;
            const captureY = (totalH - sliceH) / 2;
            ctx.strokeRect(2, captureY+2, totalW-4, sliceH-4);
        }

        function generateSlices(count, sliceW, sliceH) {
            slicesGrid.innerHTML = '';
            slicesDataUrls = [];
            for (let i = 0; i < count; i++) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = sliceW;
                tempCanvas.height = sliceH;
                const tCtx = tempCanvas.getContext('2d');
                
                if (blurToggle.checked && sliceH > originalImage.height) {
                    tCtx.save();
                    tCtx.filter = 'blur(60px)';
                    const scale = Math.max(sliceW / originalImage.width, sliceH / originalImage.height);
                    const drawW = originalImage.width * scale;
                    const drawH = originalImage.height * scale;
                    tCtx.drawImage(originalImage, (sliceW - drawW) / 2, (sliceH - drawH) / 2, drawW, drawH);
                    tCtx.restore();
                    tCtx.fillStyle = 'rgba(0,0,0,0.3)';
                    tCtx.fillRect(0, 0, sliceW, sliceH);
                } else {
                    tCtx.fillStyle = "white"; 
                    tCtx.fillRect(0, 0, sliceW, sliceH);
                }
                
                tCtx.drawImage(originalImage, i * sliceW, 0, sliceW, originalImage.height, 0, (sliceH - originalImage.height) / 2, sliceW, originalImage.height);
                
                const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.95);
                slicesDataUrls.push(dataUrl);

                const wrapper = document.createElement('div');
                wrapper.className = "group relative aspect-square bg-zinc-100 dark:bg-zinc-900 rounded-xl overflow-hidden border border-gray-200 dark:border-zinc-800 transition-all hover:scale-[1.02] cursor-pointer";
                wrapper.innerHTML = `
                    <img src="${dataUrl}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                        <span class="text-white text-xs font-bold bg-blue-600 px-3 py-1 rounded-full shadow-lg">Download Slice ${i+1}</span>
                    </div>
                `;
                wrapper.onclick = (e) => {
                    e.stopPropagation();
                    const link = document.createElement('a');
                    link.download = `${originalFileName}_slice_${i+1}.jpg`;
                    link.href = dataUrl;
                    link.click();
                };
                slicesGrid.appendChild(wrapper);
            }
        }

        function showToast(msg, fastClose = false) {
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, fastClose ? 2000 : 4000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanoSplitter Pro - Redesigned</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .dark body { background-color: #000000; }
        
        .canvas-container {
            width: 100%;
            height: 100%;
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            touch-action: none;
            position: relative;
            overflow: hidden;
            border-radius: 1.5rem;
        }
        
        .canvas-container:active { cursor: grabbing; }
        
        canvas {
            max-width: 100%;
            height: auto !important;
            transition: opacity 0.3s ease;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        .tab-active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }

        /* Glassmorphism for overlays */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-black min-h-screen text-gray-900 dark:text-gray-100 antialiased overflow-x-hidden">

    <!-- Header -->
    <nav class="sticky top-0 z-50 border-b border-gray-200 dark:border-zinc-900 bg-white/80 dark:bg-black/80 backdrop-blur-md px-6 py-3">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white italic">P</div>
                <h1 class="text-xl font-bold tracking-tight">PanoSplitter <span class="text-blue-500">Pro</span></h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-full transition-colors">
                    <svg id="sunIcon" class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="moonIcon" class="hidden w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
                <div class="h-6 w-px bg-gray-200 dark:bg-zinc-800"></div>
                <button id="headerUploadBtn" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold transition-all shadow-lg shadow-blue-600/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    Upload Photo
                </button>
            </div>
        </div>
    </nav>

    <!-- Initial Landing Upload -->
    <div id="uploadSection" class="max-w-4xl mx-auto mt-20 p-8">
        <div id="dropZone" class="border-2 border-dashed border-gray-200 dark:border-zinc-800 rounded-[2.5rem] p-20 text-center hover:border-blue-500 hover:bg-blue-50/5 transition-all cursor-pointer group">
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mb-8 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </div>
                <h2 class="text-3xl font-bold mb-2">Create Seamless Carousels</h2>
                <p class="text-gray-500 dark:text-zinc-400">Drag your panorama here to begin splitting.</p>
            </div>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
    </div>

    <!-- Main Editor Interface -->
    <main id="editorSection" class="hidden h-[calc(100vh-65px)] flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Sidebar Controls -->
        <aside class="w-full lg:w-80 h-full border-r border-gray-200 dark:border-zinc-900 bg-white dark:bg-black flex flex-col z-20">
            <!-- Tabs -->
            <div class="flex border-b border-gray-100 dark:border-zinc-900">
                <button id="tabLayout" class="flex-1 py-4 text-xs font-black uppercase tracking-widest tab-active">Layout</button>
                <button id="tabProcess" class="flex-1 py-4 text-xs font-black uppercase tracking-widest text-gray-400">Process</button>
            </div>

            <div id="controlPanel" class="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
                
                <!-- Layout Content -->
                <div id="layoutControls" class="space-y-8">
                    <section>
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Slices</label>
                            <span id="sliceCountDisplay" class="bg-blue-600/10 text-blue-600 px-2 py-0.5 rounded text-xs font-black">3</span>
                        </div>
                        <input type="range" id="sliceRange" min="2" max="15" value="3" class="w-full h-1.5 bg-gray-200 dark:bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    </section>

                    <section>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Aspect Ratio</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button class="ratio-btn p-3 text-[10px] font-bold border border-zinc-200 dark:border-zinc-800 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-all" data-ratio="0.8">4:5 Portrait</button>
                            <button class="ratio-btn p-3 text-[10px] font-bold border border-zinc-200 dark:border-zinc-800 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-all" data-ratio="1">1:1 Square</button>
                            <button class="ratio-btn p-3 text-[10px] font-bold border border-zinc-200 dark:border-zinc-800 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-all" data-ratio="0.5625">9:16 Story</button>
                            <button class="ratio-btn p-3 text-[10px] font-bold border border-zinc-200 dark:border-zinc-800 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-all" data-ratio="original">Original</button>
                        </div>
                    </section>

                    <section class="space-y-4">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">Alignment</label>
                        <button id="aiFrameBtn" class="w-full py-3 bg-zinc-100 dark:bg-zinc-900 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2">
                            <svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M12 2a1 1 0 01.967.744L14.146 7.2 17.5 9.134a1 1 0 010 1.732l-3.354 1.935-1.18 4.455a1 1 0 01-1.933 0L9.854 12.8 6.5 10.866a1 1 0 010-1.732l3.354-1.935 1.18-4.455A1 1 0 0112 2z" /></svg>
                            AI Auto-Frame
                        </button>
                    </section>
                </div>

                <!-- Processing Content (Hidden by default) -->
                <div id="processControls" class="hidden space-y-8">
                     <section>
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">JPEG Quality</label>
                            <span id="qualityDisplay" class="text-xs font-black">95%</span>
                        </div>
                        <input type="range" id="qualityRange" min="1" max="100" value="95" class="w-full h-1.5 bg-gray-200 dark:bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    </section>

                    <section class="space-y-3">
                        <label class="flex items-center justify-between p-3 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 cursor-pointer transition-colors border border-transparent hover:border-zinc-100 dark:hover:border-zinc-800">
                            <span class="text-xs font-bold">Safe Zone Overlays</span>
                            <input type="checkbox" id="safeZoneToggle" checked class="sr-only peer">
                            <div class="w-8 h-4 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-zinc-800 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-600 relative"></div>
                        </label>
                        <label class="flex items-center justify-between p-3 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 cursor-pointer transition-colors border border-transparent hover:border-zinc-100 dark:hover:border-zinc-800">
                            <span class="text-xs font-bold">Smart Sharpen</span>
                            <input type="checkbox" id="sharpenToggle" checked class="sr-only peer">
                            <div class="w-8 h-4 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-zinc-800 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-600 relative"></div>
                        </label>
                        <label class="flex items-center justify-between p-3 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 cursor-pointer transition-colors border border-transparent hover:border-zinc-100 dark:hover:border-zinc-800">
                            <span class="text-xs font-bold">Seamless Overlap</span>
                            <input type="checkbox" id="overlapToggle" class="sr-only peer">
                            <div class="w-8 h-4 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-zinc-800 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-600 relative"></div>
                        </label>
                        <label class="flex items-center justify-between p-3 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 cursor-pointer transition-colors border border-transparent hover:border-zinc-100 dark:hover:border-zinc-800">
                            <span class="text-xs font-bold">Blur Background Fill</span>
                            <input type="checkbox" id="blurToggle" class="sr-only peer">
                            <div class="w-8 h-4 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-zinc-800 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-600 relative"></div>
                        </label>
                    </section>
                </div>
            </div>

            <div class="p-6 border-t border-gray-100 dark:border-zinc-900">
                <div id="statsPanel" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest flex flex-col gap-1">
                    <div class="flex justify-between"><span>Slice Size:</span> <span id="resText" class="text-zinc-900 dark:text-zinc-100">0 x 0</span></div>
                    <div class="flex justify-between"><span>Total:</span> <span id="totalResText" class="text-zinc-900 dark:text-zinc-100">0 px</span></div>
                </div>
            </div>
        </aside>

        <!-- Preview Area -->
        <div class="flex-1 bg-zinc-50 dark:bg-zinc-950 flex flex-col relative overflow-hidden">
            <div id="canvasWrapper" class="canvas-container p-4 md:p-12">
                <canvas id="previewCanvas"></canvas>
            </div>

            <!-- Footer Action Bar -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-xl px-6 py-4 rounded-[2rem] border border-gray-200 dark:border-zinc-800 shadow-2xl z-40">
                <button id="resetBtn" class="p-3 text-zinc-500 hover:text-red-500 transition-colors tooltip" title="Reset Alignment">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <div class="w-px h-6 bg-zinc-200 dark:bg-zinc-800"></div>
                <button id="downloadZipBtn" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl flex items-center gap-3 transition-all">
                    <span>Export Carousel</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            </div>
        </div>

        <!-- Gallery Strip -->
        <div class="absolute right-0 top-0 bottom-0 w-48 bg-white/5 dark:bg-black/5 backdrop-blur-sm border-l border-zinc-200 dark:border-zinc-900 p-4 overflow-y-auto hidden xl:block z-10 custom-scrollbar">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 text-center">Output Grid</h3>
            <div id="slicesGrid" class="flex flex-col gap-4"></div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 right-10 bg-zinc-950 text-white px-6 py-4 rounded-2xl shadow-2xl translate-x-[200%] transition-transform duration-500 z-[100] flex items-center gap-3 border border-zinc-800 font-bold">
        <div id="toastSpinner" class="animate-spin h-4 w-4 border-2 border-blue-500 border-t-transparent rounded-full hidden"></div>
        <span id="toastMsg">Action complete</span>
    </div>

    <script>
        const apiKey = ""; 
        let originalImage = null;
        let originalFileName = "panorama";
        let offsetY = 0; 
        let isDragging = false;
        let startY = 0;
        let debounceTimer = null;
        let currentRatio = 0.8;

        // Elements
        const elements = {
            fileInput: document.getElementById('fileInput'),
            dropZone: document.getElementById('dropZone'),
            uploadSection: document.getElementById('uploadSection'),
            editorSection: document.getElementById('editorSection'),
            headerUploadBtn: document.getElementById('headerUploadBtn'),
            sliceRange: document.getElementById('sliceRange'),
            sliceCountDisplay: document.getElementById('sliceCountDisplay'),
            qualityRange: document.getElementById('qualityRange'),
            qualityDisplay: document.getElementById('qualityDisplay'),
            blurToggle: document.getElementById('blurToggle'),
            overlapToggle: document.getElementById('overlapToggle'),
            sharpenToggle: document.getElementById('sharpenToggle'),
            safeZoneToggle: document.getElementById('safeZoneToggle'),
            aiFrameBtn: document.getElementById('aiFrameBtn'),
            previewCanvas: document.getElementById('previewCanvas'),
            slicesGrid: document.getElementById('slicesGrid'),
            downloadZipBtn: document.getElementById('downloadZipBtn'),
            resText: document.getElementById('resText'),
            totalResText: document.getElementById('totalResText'),
            resetBtn: document.getElementById('resetBtn'),
            themeToggle: document.getElementById('themeToggle')
        };

        // Theme Toggle
        elements.themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
            if (originalImage) triggerFullUpdate();
        });

        // Tabs Logic
        const tabLayout = document.getElementById('tabLayout');
        const tabProcess = document.getElementById('tabProcess');
        const layoutControls = document.getElementById('layoutControls');
        const processControls = document.getElementById('processControls');

        tabLayout.onclick = () => {
            tabLayout.classList.add('tab-active'); tabProcess.classList.remove('tab-active');
            layoutControls.classList.remove('hidden'); processControls.classList.add('hidden');
        };
        tabProcess.onclick = () => {
            tabProcess.classList.add('tab-active'); tabLayout.classList.remove('tab-active');
            processControls.classList.remove('hidden'); layoutControls.classList.add('hidden');
        };

        // Ratio Selector Redesign
        document.querySelectorAll('.ratio-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600'));
                btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                currentRatio = btn.dataset.ratio === 'original' ? 'original' : parseFloat(btn.dataset.ratio);
                triggerFullUpdate();
            };
        });
        // Set initial ratio
        document.querySelector('[data-ratio="0.8"]').click();

        // Upload Handlers
        elements.headerUploadBtn.onclick = () => elements.fileInput.click();
        elements.dropZone.onclick = () => elements.fileInput.click();
        elements.fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const file = files[0];
            if (!file) return;
            originalFileName = file.name.split('.').slice(0, -1).join('.') || "panorama";
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    elements.uploadSection.classList.add('hidden');
                    elements.editorSection.classList.remove('hidden');
                    offsetY = 0;
                    triggerFullUpdate();
                    showToast("Workspace loaded");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Preview Rendering Logic
        function triggerFullUpdate() {
            if (!originalImage) return;
            const sliceCount = parseInt(elements.sliceRange.value);
            elements.sliceCountDisplay.textContent = sliceCount;
            elements.qualityDisplay.textContent = elements.qualityRange.value + '%';
            
            const sliceWidth = originalImage.width / sliceCount;
            const sliceHeight = currentRatio === 'original' ? originalImage.height : sliceWidth / currentRatio;
            
            elements.resText.textContent = `${Math.round(sliceWidth)} x ${Math.round(sliceHeight)}`;
            elements.totalResText.textContent = `${Math.round(sliceWidth * sliceCount)} px`;
            
            drawPreview(sliceCount, sliceWidth, sliceHeight);
            renderSlices();
        }

        function drawPreview(count, sliceW, sliceH) {
            const ctx = elements.previewCanvas.getContext('2d');
            const totalW = sliceW * count;
            const totalH = Math.max(originalImage.height, sliceH);
            
            elements.previewCanvas.width = totalW;
            elements.previewCanvas.height = totalH;
            
            const imgY = ((totalH - originalImage.height) / 2) + offsetY;
            const captureY = (totalH - sliceH) / 2;

            // Background
            ctx.fillStyle = document.documentElement.classList.contains('dark') ? '#000000' : '#f9fafb';
            ctx.fillRect(0,0, totalW, totalH);

            // Blur Fill
            if (elements.blurToggle.checked && sliceH > originalImage.height) {
                ctx.save();
                ctx.filter = 'blur(50px) brightness(0.6)';
                const scale = Math.max(totalW / originalImage.width, totalH / originalImage.height);
                ctx.drawImage(originalImage, (totalW - (originalImage.width * scale)) / 2, (totalH - (originalImage.height * scale)) / 2, originalImage.width * scale, originalImage.height * scale);
                ctx.restore();
            }

            ctx.drawImage(originalImage, 0, imgY);

            // Interaction Overlays
            if (elements.safeZoneToggle.checked) {
                ctx.save();
                for (let i = 0; i < count; i++) {
                    const x = i * sliceW;
                    // Instagram Sidebar Area
                    ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
                    ctx.fillRect(x + sliceW * 0.85, captureY + sliceH * 0.45, sliceW * 0.12, sliceH * 0.4); 
                    // Caption Area
                    ctx.fillRect(x + sliceW * 0.05, captureY + sliceH * 0.8, sliceW * 0.5, sliceH * 0.15);
                }
                ctx.restore();
            }

            // Grid Lines
            ctx.strokeStyle = "rgba(59, 130, 246, 0.5)";
            ctx.lineWidth = totalW / 600;
            ctx.setLineDash([10, 10]);
            for (let i = 1; i < count; i++) {
                ctx.beginPath(); ctx.moveTo(i * sliceW, 0); ctx.lineTo(i * sliceW, totalH); ctx.stroke();
            }

            // Capture Frame
            ctx.setLineDash([]);
            ctx.strokeStyle = "#3b82f6";
            ctx.lineWidth = 10;
            ctx.strokeRect(0, captureY, totalW, sliceH);
        }

        // Dragging Logic
        const handleStart = (y) => { isDragging = true; startY = y - offsetY; };
        const handleMove = (y) => { if (isDragging) { offsetY = y - startY; drawPreviewOnly(); } };
        const handleEnd = () => { if (isDragging) { isDragging = false; triggerFullUpdate(); } };

        function drawPreviewOnly() {
            const count = parseInt(elements.sliceRange.value);
            const sliceWidth = originalImage.width / count;
            const sliceHeight = currentRatio === 'original' ? originalImage.height : sliceWidth / currentRatio;
            drawPreview(count, sliceWidth, sliceHeight);
        }

        elements.previewCanvas.onmousedown = (e) => handleStart(e.clientY);
        window.onmousemove = (e) => handleMove(e.clientY);
        window.onmouseup = handleEnd;

        // Image Processing: Slices
        function renderSlices() {
            if (!originalImage) return;
            const count = parseInt(elements.sliceRange.value);
            const sliceW = originalImage.width / count;
            const sliceH = currentRatio === 'original' ? originalImage.height : sliceW / currentRatio;
            elements.slicesGrid.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = sliceW; canvas.height = sliceH;
                const ctx = canvas.getContext('2d');
                const imgYInsideSlice = ((sliceH - originalImage.height) / 2) + offsetY;

                if (elements.blurToggle.checked && sliceH > originalImage.height) {
                    ctx.save(); ctx.filter = 'blur(60px) brightness(0.6)';
                    const scale = Math.max(sliceW / originalImage.width, sliceH / originalImage.height);
                    ctx.drawImage(originalImage, (sliceW - (originalImage.width * scale)) / 2, (sliceH - (originalImage.height * scale)) / 2, originalImage.width * scale, originalImage.height * scale);
                    ctx.restore();
                }

                ctx.drawImage(originalImage, i * sliceW, 0, sliceW, originalImage.height, 0, imgYInsideSlice, sliceW, originalImage.height);
                
                const url = canvas.toDataURL('image/jpeg', 0.8);
                const div = document.createElement('div');
                div.className = "group relative rounded-xl overflow-hidden aspect-square border border-white/10 shadow-lg cursor-pointer hover:scale-105 transition-all";
                div.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-blue-600/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                        <span class="text-[10px] font-black text-white">PART ${i+1}</span>
                    </div>
                `;
                div.onclick = () => {
                    const l = document.createElement('a');
                    l.download = `${originalFileName}_${i+1}.jpg`;
                    l.href = canvas.toDataURL('image/jpeg', parseInt(elements.qualityRange.value)/100);
                    l.click();
                }
                elements.slicesGrid.appendChild(div);
            }
        }

        // Action Buttons
        elements.downloadZipBtn.onclick = async () => {
            showToast("Packaging Carousel...", true);
            const zip = new JSZip();
            const count = parseInt(elements.sliceRange.value);
            const q = parseInt(elements.qualityRange.value) / 100;
            const sliceW = originalImage.width / count;
            const sliceH = currentRatio === 'original' ? originalImage.height : sliceW / currentRatio;

            for (let i = 0; i < count; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = sliceW; canvas.height = sliceH;
                const ctx = canvas.getContext('2d');
                const imgYInsideSlice = ((sliceH - originalImage.height) / 2) + offsetY;
                
                if (elements.blurToggle.checked && sliceH > originalImage.height) {
                    ctx.save(); ctx.filter = 'blur(60px) brightness(0.6)';
                    const scale = Math.max(sliceW / originalImage.width, sliceH / originalImage.height);
                    ctx.drawImage(originalImage, (sliceW - (originalImage.width * scale)) / 2, (sliceH - (originalImage.height * scale)) / 2, originalImage.width * scale, originalImage.height * scale);
                    ctx.restore();
                }

                ctx.drawImage(originalImage, i * sliceW, 0, sliceW, originalImage.height, 0, imgYInsideSlice, sliceW, originalImage.height);
                const base64 = canvas.toDataURL('image/jpeg', q).split(',')[1];
                zip.file(`${originalFileName}_${i+1}.jpg`, base64, {base64: true});
            }

            const content = await zip.generateAsync({type: "blob"});
            const l = document.createElement('a');
            l.href = URL.createObjectURL(content);
            l.download = `${originalFileName}_carousel.zip`;
            l.click();
            showToast("Export Ready");
        };

        elements.resetBtn.onclick = () => { offsetY = 0; triggerFullUpdate(); showToast("Alignment Reset"); };

        elements.aiFrameBtn.onclick = async () => {
            if (!originalImage) return;
            showToast("AI Scanning Scene...", true);
            const thumbCanvas = document.createElement('canvas');
            thumbCanvas.width = 1000;
            thumbCanvas.height = (originalImage.height / originalImage.width) * 1000;
            thumbCanvas.getContext('2d').drawImage(originalImage, 0, 0, thumbCanvas.width, thumbCanvas.height);
            const base64Image = thumbCanvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            role: "user",
                            parts: [{ text: "Determine the vertical focus of this panorama (where the main subject is). Respond with a JSON object: {'vertical_center_percent': 0-100}" }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                const targetPercent = result.vertical_center_percent || 50;

                const count = parseInt(elements.sliceRange.value);
                const sliceW = originalImage.width / count;
                const sliceH = currentRatio === 'original' ? originalImage.height : sliceW / currentRatio;
                const totalH = Math.max(originalImage.height, sliceH);
                
                offsetY = (totalH / 2) - ((totalH - originalImage.height) / 2 + (originalImage.height * (targetPercent / 100)));
                triggerFullUpdate();
                showToast("AI Reframed Complete");
            } catch (err) {
                showToast("AI Reframe Failed");
            }
        };

        function showToast(msg, spin = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            document.getElementById('toastSpinner').classList.toggle('hidden', !spin);
            toast.classList.remove('translate-x-[200%]');
            if (!spin) setTimeout(() => toast.classList.add('translate-x-[200%]'), 3000);
        }

        // Global Event Listeners
        [elements.sliceRange, elements.qualityRange, elements.blurToggle, elements.overlapToggle, elements.sharpenToggle, elements.safeZoneToggle].forEach(el => {
            el.addEventListener('input', triggerFullUpdate);
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanoSplitter Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { zinc: { 950: '#09090b' } }
                }
            }
        }
    </script>
    <style>
        .dark body { background-color: #000000; }
        .canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            touch-action: none;
            position: relative;
            overflow: hidden;
            background-image: 
                radial-gradient(#27272a 1px, transparent 1px),
                radial-gradient(#27272a 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .canvas-container:active { cursor: grabbing; }
        canvas {
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ratio-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-black min-h-screen text-gray-900 dark:text-gray-100 antialiased overflow-hidden flex flex-col">

    <!-- Header -->
    <nav class="relative z-[60] border-b border-gray-200 dark:border-zinc-900 bg-white/90 dark:bg-black/90 backdrop-blur-md px-4 py-3 shrink-0">
        <div class="max-w-full mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white italic">P</div>
                <h1 class="text-xl font-bold tracking-tight">PanoSplitter <span class="text-blue-500">Pro</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-full">
                    <svg id="sunIcon" class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1-1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                </button>
                <button id="headerUploadBtn" class="px-4 py-2 bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-xl text-sm font-bold transition-all">Replace Image</button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div id="uploadSection" class="flex-1 flex items-center justify-center p-8">
        <div id="dropZone" class="max-w-4xl w-full border-2 border-dashed border-zinc-800 rounded-[2.5rem] p-20 text-center hover:border-blue-500 hover:bg-blue-50/5 transition-all cursor-pointer">
            <h2 class="text-3xl font-bold mb-2">Drop Panorama Here</h2>
            <p class="text-zinc-500">Works best with ultra-wide photos</p>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
    </div>

    <main id="editorSection" class="hidden flex-1 flex flex-col lg:flex-row overflow-hidden">
        <!-- Left Sidebar -->
        <aside class="w-full lg:w-80 border-r border-zinc-200 dark:border-zinc-900 bg-white dark:bg-black p-6 space-y-8 overflow-y-auto">
            <section>
                <div class="flex justify-between items-center mb-4">
                    <label class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Slices</label>
                    <span id="sliceVal" class="text-blue-500 font-black">3</span>
                </div>
                <input type="range" id="sliceRange" min="2" max="10" value="3" class="w-full accent-blue-600">
            </section>

            <section>
                <label class="text-xs font-bold text-zinc-400 uppercase tracking-widest block mb-4">Aspect Ratio</label>
                <div class="grid grid-cols-2 gap-2">
                    <button class="ratio-btn p-3 text-[10px] font-bold border border-zinc-800 rounded-xl active" data-ratio="0.8">4:5 Portrait</button>
                    <button class="ratio-btn p-3 text-[10px] font-bold border border-zinc-800 rounded-xl" data-ratio="1">1:1 Square</button>
                    <button class="ratio-btn p-3 text-[10px] font-bold border border-zinc-800 rounded-xl" data-ratio="1.77">16:9 Wide</button>
                    <button class="ratio-btn p-3 text-[10px] font-bold border border-zinc-800 rounded-xl" data-ratio="original">Original</button>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-center mb-4">
                    <label class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Rotation</label>
                    <span id="rotVal" class="text-zinc-500 font-bold">0°</span>
                </div>
                <input type="range" id="rotationRange" min="-10" max="10" step="0.1" value="0" class="w-full accent-blue-600">
            </section>

            <div class="pt-6 border-t border-zinc-900">
                <button id="aiFrameBtn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-600/20 active:scale-95 transition-all">AI Auto-Center</button>
            </div>
        </aside>

        <!-- Preview -->
        <div class="flex-1 bg-zinc-950 flex flex-col relative">
            <div class="canvas-container">
                <canvas id="previewCanvas"></canvas>
            </div>
            
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-zinc-900/90 backdrop-blur-xl px-6 py-4 rounded-[2rem] border border-zinc-800">
                <button id="downloadZipBtn" class="flex items-center gap-2 bg-white text-black px-6 py-2 rounded-xl font-bold hover:bg-zinc-200 transition-all">
                    <span>Export Carousel</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 right-10 bg-white text-black px-6 py-4 rounded-2xl shadow-2xl translate-x-[200%] transition-transform duration-500 z-[100] font-bold"></div>

    <script>
        const apiKey = "";
        let originalImage = null;
        let offsetY = 0;
        let isDragging = false;
        let startY = 0;
        let currentRatio = 0.8; 
        let rotation = 0;
        let slices = 3;

        const cvs = document.getElementById('previewCanvas');
        const ctx = cvs.getContext('2d');

        // Setup listeners
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    document.getElementById('uploadSection').classList.add('hidden');
                    document.getElementById('editorSection').classList.remove('hidden');
                    resetState();
                    draw();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('headerUploadBtn').onclick = () => document.getElementById('fileInput').click();

        function resetState() {
            offsetY = 0;
            rotation = 0;
            slices = 3;
            document.getElementById('sliceRange').value = 3;
            document.getElementById('rotationRange').value = 0;
        }

        document.getElementById('sliceRange').oninput = (e) => {
            slices = parseInt(e.target.value);
            document.getElementById('sliceVal').textContent = slices;
            draw();
        };

        document.getElementById('rotationRange').oninput = (e) => {
            rotation = parseFloat(e.target.value);
            document.getElementById('rotVal').textContent = rotation + '°';
            draw();
        };

        document.querySelectorAll('.ratio-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRatio = btn.dataset.ratio === 'original' ? 'original' : parseFloat(btn.dataset.ratio);
                draw();
            };
        });

        // Viewport Logic
        function draw() {
            if (!originalImage) return;

            // 1. Calculate the target dimensions for the "Total Crop Area"
            // The Crop Area is 'slices' wide and 1 'slice' high.
            const sliceWidth = originalImage.width / slices;
            const sliceHeight = currentRatio === 'original' ? originalImage.height : sliceWidth / currentRatio;
            
            const totalCropWidth = originalImage.width;
            const totalCropHeight = sliceHeight;

            // 2. Set Canvas Size to accommodate the image AND the crop area
            // We use the image width as the base scale
            cvs.width = originalImage.width;
            cvs.height = Math.max(originalImage.height, totalCropHeight) * 1.2; // Extra padding

            ctx.clearRect(0, 0, cvs.width, cvs.height);
            
            // 3. Draw Image (Centered with Offset)
            ctx.save();
            ctx.translate(cvs.width/2, cvs.height/2 + offsetY);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.drawImage(originalImage, -originalImage.width/2, -originalImage.height/2);
            ctx.restore();

            // 4. Draw Overlay UI
            const cropY = (cvs.height - totalCropHeight) / 2;

            // Darken outside
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, cvs.width, cropY);
            ctx.fillRect(0, cropY + totalCropHeight, cvs.width, cvs.height);

            // Blue Frame
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = cvs.width / 200;
            ctx.strokeRect(0, cropY, cvs.width, totalCropHeight);

            // Dividers
            ctx.setLineDash([cvs.width/100, cvs.width/100]);
            ctx.lineWidth = cvs.width / 400;
            for(let i=1; i<slices; i++) {
                const x = (cvs.width / slices) * i;
                ctx.beginPath();
                ctx.moveTo(x, cropY);
                ctx.lineTo(x, cropY + totalCropHeight);
                ctx.stroke();
            }
        }

        // Drag Logic
        cvs.onmousedown = (e) => { isDragging = true; startY = e.clientY - offsetY; };
        window.onmousemove = (e) => { 
            if(isDragging) { 
                offsetY = e.clientY - startY; 
                draw(); 
            } 
        };
        window.onmouseup = () => { isDragging = false; };

        // AI Logic
        document.getElementById('aiFrameBtn').onclick = async () => {
            const t = document.getElementById('toast');
            t.textContent = "AI Analyzing Focal Points...";
            t.classList.remove('translate-x-[200%]');

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 800;
            tempCanvas.height = (originalImage.height / originalImage.width) * 800;
            tempCanvas.getContext('2d').drawImage(originalImage, 0,0,800,tempCanvas.height);
            const b64 = tempCanvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                {text: "Analyze image. Return JSON: {center_y_percent: 0-100} representing the most important horizontal slice center."},
                                {inlineData: {mimeType: "image/jpeg", data: b64}}
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const json = await res.json();
                const data = JSON.parse(json.candidates[0].content.parts[0].text);
                
                // Animate to position
                const targetY = (originalImage.height / 2) - (originalImage.height * (data.center_y_percent / 100));
                offsetY = targetY;
                draw();
                
                t.textContent = "AI Re-centered!";
                setTimeout(() => t.classList.add('translate-x-[200%]'), 2000);
            } catch (e) {
                t.textContent = "AI Analysis Failed";
                setTimeout(() => t.classList.add('translate-x-[200%]'), 2000);
            }
        };

        // ZIP Export
        document.getElementById('downloadZipBtn').onclick = async () => {
            const zip = new JSZip();
            const sliceW = originalImage.width / slices;
            const sliceH = currentRatio === 'original' ? originalImage.height : sliceW / currentRatio;

            for(let i=0; i<slices; i++) {
                const out = document.createElement('canvas');
                out.width = sliceW;
                out.height = sliceH;
                const octx = out.getContext('2d');
                
                octx.save();
                octx.translate(-i * sliceW, (sliceH - originalImage.height)/2 + offsetY);
                octx.translate(originalImage.width/2, originalImage.height/2);
                octx.rotate(rotation * Math.PI / 180);
                octx.drawImage(originalImage, -originalImage.width/2, -originalImage.height/2);
                octx.restore();
                
                const data = out.toDataURL('image/jpeg', 0.95).split(',')[1];
                zip.file(`slice_${i+1}.jpg`, data, {base64: true});
            }

            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "carousel_slices.zip";
            link.click();
        };

    </script>
</body>
</html>

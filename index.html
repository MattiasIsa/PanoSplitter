<!DOCTYPE html>
<html lang="en" class="dark" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama Fragmenter v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

        :root {
            --brand-primary: #3b82f6;
            --transition-speed: 0.3s;
        }

        /* Enhanced Midnight Dark Theme */
        .dark {
            --bg-main: #020617; /* Deep midnight black */
            --bg-sidebar: #0f172a;
            --bg-header: #020617;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --input-bg: #020617;
            --card-bg: rgba(255, 255, 255, 0.02);
        }

        .light {
            --bg-main: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-header: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            --card-bg: rgba(0, 0, 0, 0.02);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        .sidebar {
            background-color: var(--bg-sidebar);
            border-color: var(--border-color);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        /* Modernized Numerical Inputs */
        .num-input {
            @apply border rounded-lg px-1.5 py-1 text-[11px] focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-center font-bold appearance-none;
            background-color: var(--input-bg);
            border-color: var(--border-color);
            color: var(--brand-primary);
            -moz-appearance: textfield;
        }

        /* Short variant for rotation */
        .num-input-short {
            width: 44px;
        }

        .num-input::-webkit-outer-spin-button,
        .num-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Premium Machined Ratio Buttons */
        .btn-ratio {
            @apply border rounded-xl py-3 px-2 text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center relative overflow-hidden;
            background-color: var(--input-bg);
            border-color: var(--border-color);
            color: var(--text-muted);
        }

        .btn-ratio:hover {
            @apply border-blue-500/50 text-blue-400;
            background-color: rgba(59, 130, 246, 0.05);
        }

        .btn-ratio.active-ratio {
            @apply bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-500/30 scale-100;
        }

        input[type="range"] {
            @apply h-1.5 rounded-lg appearance-none cursor-pointer accent-blue-500;
            background-color: var(--border-color);
        }

        .fragment-preview {
            aspect-ratio: var(--preview-ratio);
            @apply rounded-xl border shadow-2xl transition-transform hover:scale-[1.05] relative overflow-hidden;
            background-color: var(--input-bg);
            border-color: var(--border-color);
        }

        .viewfinder-border {
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05), 0 20px 80px rgba(0,0,0,0.8);
        }
        
        .theme-btn {
            @apply p-2 rounded-lg border transition-all flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest;
            background-color: var(--input-bg);
            border-color: var(--border-color);
        }
        .theme-btn.active {
            @apply bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-500/20;
        }

        .sidebar-section-title {
            @apply text-[9px] font-black text-blue-500 uppercase tracking-[0.3em] mb-4 flex items-center gap-2;
        }

        .letterbox-overlay {
            background: rgba(0, 0, 0, 0.95);
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- HEADER -->
    <header class="h-16 border-b flex items-center justify-between px-8 z-50 transition-colors duration-300" style="background-color: var(--bg-header); border-color: var(--border-color);">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-xl shadow-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-tighter uppercase italic leading-none" style="color: var(--text-main)">Fragmenter</h1>
                <span class="text-[10px] text-blue-500 font-bold tracking-widest uppercase">Visual Studio 2.3</span>
            </div>
        </div>
        
        <div class="flex items-center gap-8">
            <!-- Explicit Theme Switcher -->
            <div class="flex p-1 rounded-xl border" style="background-color: var(--input-bg); border-color: var(--border-color)">
                <button id="theme-light" class="theme-btn px-4 py-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707" /></svg>
                    Light
                </button>
                <button id="theme-dark" class="theme-btn px-4 py-2 active ml-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Dark
                </button>
            </div>

            <div class="flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">System Ready</span>
            </div>
        </div>
    </header>

    <!-- LANDING / DROPZONE -->
    <div id="landing-zone" class="absolute inset-0 z-40 flex flex-col items-center justify-center transition-opacity duration-500" style="background-color: var(--bg-main)">
        <label for="file-upload" class="border-2 border-dashed rounded-[3rem] p-20 flex flex-col items-center cursor-pointer hover:border-blue-500 transition-all group max-w-xl w-full" style="background-color: var(--bg-sidebar); border-color: var(--border-color)">
            <div class="w-24 h-24 bg-blue-500/10 text-blue-500 rounded-[2rem] flex items-center justify-center mb-8 group-hover:scale-110 group-hover:bg-blue-500/20 transition-all duration-500 shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
            <span class="text-3xl font-black italic uppercase tracking-tighter" style="color: var(--text-main)">Import Master</span>
            <span class="text-sm mt-3 opacity-60 font-medium" style="color: var(--text-muted)">High-Resolution Panoramic Source</span>
            <input type="file" id="file-upload" class="hidden" accept="image/*">
        </label>
    </div>

    <!-- MAIN INTERFACE -->
    <main class="flex-1 flex overflow-hidden hidden" id="main-interface">
        
        <!-- LEFT SIDEBAR: CONTROLS -->
        <aside class="sidebar w-80 border-r flex flex-col overflow-y-auto p-8 gap-10 shadow-2xl">
            <section>
                <h2 class="sidebar-section-title">Geometry Controls</h2>
                
                <!-- Slices -->
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-bold opacity-60 uppercase tracking-wider">Slices</span>
                        <input type="number" id="slice-input" min="2" max="10" value="3" class="num-input w-12">
                    </div>
                    <input type="range" id="slice-range" min="2" max="10" value="3" class="w-full" title="Double click to reset">
                </div>

                <!-- Rotation -->
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-bold opacity-60 uppercase tracking-wider">Rotation</span>
                        <input type="number" id="rot-input" step="0.5" value="0" class="num-input num-input-short">
                    </div>
                    <input type="range" id="rot-range" min="-15" max="15" step="0.5" value="0" class="w-full" title="Double click to reset">
                </div>

                <!-- Zoom -->
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-bold opacity-60 uppercase tracking-wider">Zoom</span>
                        <input type="number" id="zoom-input" step="0.01" min="0.1" max="5" value="1.00" class="num-input w-16">
                    </div>
                    <input type="range" id="zoom-range" min="0.1" max="3" step="0.01" value="1" class="w-full" title="Double click to reset">
                </div>
            </section>

            <section>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="sidebar-section-title">Aspect Configuration</h2>
                    <button id="flip-ratio-btn" class="p-2 hover:bg-blue-500/10 rounded-full transition-colors text-blue-500" title="Flip Orientation">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                        </svg>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button class="ratio-btn btn-ratio" data-ratio="0.8">4:5</button>
                    <button class="ratio-btn btn-ratio active-ratio" data-ratio="1">1:1</button>
                    <button class="ratio-btn btn-ratio" data-ratio="1.777">16:9</button>
                    <button class="ratio-btn btn-ratio" data-ratio="auto">AUTO</button>
                </div>
            </section>

            <section>
                <h2 class="sidebar-section-title">Display Settings</h2>
                <div class="space-y-3">
                    <label class="flex items-center justify-between p-4 rounded-2xl bg-slate-500/5 cursor-pointer border border-transparent hover:border-blue-500/30 transition-all">
                        <span class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Safe Zones</span>
                        <input type="checkbox" id="toggle-safe-zones" class="accent-blue-500 w-5 h-5">
                    </label>
                    <label class="flex items-center justify-between p-4 rounded-2xl bg-slate-500/5 cursor-pointer border border-transparent hover:border-blue-500/30 transition-all">
                        <span class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Grid Guides</span>
                        <input type="checkbox" id="toggle-grid" checked class="accent-blue-500 w-5 h-5">
                    </label>
                </div>
            </section>

            <div class="mt-auto pt-8 border-t" style="border-color: var(--border-color)">
                <button id="export-btn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-2xl shadow-blue-500/40 hover:bg-blue-500 hover:scale-[0.98] active:scale-95 transition-all flex flex-col items-center justify-center leading-tight">
                    <span class="text-base tracking-widest uppercase italic">Process Batch</span>
                    <span class="text-[10px] opacity-70 mt-1 uppercase tracking-widest font-bold">Generate JPEG Sequence</span>
                </button>
            </div>
        </aside>

        <!-- CENTER: VISUAL WORKSPACE -->
        <section class="flex-1 relative overflow-hidden flex items-center justify-center cursor-move" id="workspace" style="background-color: var(--bg-main)">
            <!-- Viewport Container -->
            <div id="viewfinder-container" class="relative z-10 transition-all duration-300">
                <div id="top-letterbox" class="letterbox-overlay absolute w-[10000px] h-[5000px] left-[-5000px] bottom-full"></div>
                <div id="bottom-letterbox" class="letterbox-overlay absolute w-[10000px] h-[5000px] left-[-5000px] top-full"></div>
                
                <!-- Viewfinder Content -->
                <div id="viewfinder" class="relative overflow-hidden bg-white viewfinder-border rounded-sm">
                    <img id="main-image" src="" class="absolute max-w-none origin-center pointer-events-none select-none">
                    <div id="slice-guides" class="absolute inset-0 flex pointer-events-none transition-opacity duration-300"></div>
                    
                    <!-- Social Media Safe Zones -->
                    <div id="safe-zones" class="absolute inset-0 hidden pointer-events-none opacity-50">
                        <div class="absolute right-4 bottom-32 flex flex-col gap-6">
                            <div class="w-10 h-10 rounded-full border border-white/20 bg-white/5 backdrop-blur-sm"></div>
                            <div class="w-10 h-10 rounded-full border border-white/20 bg-white/5 backdrop-blur-sm"></div>
                            <div class="w-10 h-10 rounded-full border border-white/20 bg-white/5 backdrop-blur-sm"></div>
                        </div>
                        <div class="absolute bottom-6 left-6 right-16 h-10 border border-white/20 bg-white/5 backdrop-blur-sm rounded"></div>
                    </div>
                </div>
            </div>

            <!-- Coordinate Tooltip -->
            <div class="absolute bottom-10 right-10 px-6 py-3 rounded-2xl border font-mono text-[11px] font-bold text-blue-500 shadow-2xl flex items-center gap-3" style="background-color: var(--bg-sidebar); border-color: var(--border-color)">
                <span class="opacity-30 uppercase">Vector</span>
                <span id="coords">X:0 Y:0</span>
            </div>
        </section>

        <!-- RIGHT SIDEBAR: FRAGMENT OUTPUT -->
        <aside class="w-64 sidebar border-l flex flex-col">
            <div class="p-6 border-b flex items-center justify-between" style="border-color: var(--border-color)">
                <span class="text-[10px] font-black opacity-50 uppercase tracking-[0.2em]">Buffer</span>
                <span id="fragment-count" class="text-[10px] px-3 py-1 bg-blue-500 text-white rounded-full font-black shadow-lg shadow-blue-500/20">0</span>
            </div>
            <div id="previews-container" class="flex-1 overflow-y-auto p-6 space-y-8">
                <!-- Previews populated via JS -->
            </div>
        </aside>
    </main>

    <script>
        // --- STATE ---
        const state = {
            image: null,
            fileName: 'panorama',
            imgW: 0,
            imgH: 0,
            posX: 0,
            posY: 0,
            zoom: 1,
            rotation: 0,
            slices: 3,
            ratio: 1,
            isDragging: false,
            startX: 0,
            startY: 0,
            viewfinderW: 0,
            viewfinderH: 0
        };

        const DEFAULTS = {
            slices: 3,
            rotation: 0,
            zoom: 1
        };

        const elements = {
            htmlRoot: document.getElementById('root-html'),
            themeLight: document.getElementById('theme-light'),
            themeDark: document.getElementById('theme-dark'),
            landing: document.getElementById('landing-zone'),
            main: document.getElementById('main-interface'),
            fileInput: document.getElementById('file-upload'),
            mainImg: document.getElementById('main-image'),
            viewfinder: document.getElementById('viewfinder'),
            sliceRange: document.getElementById('slice-range'),
            sliceInput: document.getElementById('slice-input'),
            rotRange: document.getElementById('rot-range'),
            rotInput: document.getElementById('rot-input'),
            zoomRange: document.getElementById('zoom-range'),
            zoomInput: document.getElementById('zoom-input'),
            workspace: document.getElementById('workspace'),
            sliceGuides: document.getElementById('slice-guides'),
            previews: document.getElementById('previews-container'),
            coordDisplay: document.getElementById('coords'),
            toggleSafe: document.getElementById('toggle-safe-zones'),
            safeZones: document.getElementById('safe-zones'),
            toggleGrid: document.getElementById('toggle-grid'),
            exportBtn: document.getElementById('export-btn'),
            flipBtn: document.getElementById('flip-ratio-btn'),
            fragmentCount: document.getElementById('fragment-count')
        };

        // --- THEME ---
        function setTheme(mode) {
            if (mode === 'dark') {
                elements.htmlRoot.classList.add('dark');
                elements.htmlRoot.classList.remove('light');
                elements.themeDark.classList.add('active');
                elements.themeLight.classList.remove('active');
            } else {
                elements.htmlRoot.classList.add('light');
                elements.htmlRoot.classList.remove('dark');
                elements.themeLight.classList.add('active');
                elements.themeDark.classList.remove('active');
            }
        }
        elements.themeLight.onclick = () => setTheme('light');
        elements.themeDark.onclick = () => setTheme('dark');

        // --- INIT ---
        elements.fileInput.addEventListener('change', handleFile);
        
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            state.fileName = file.name.replace(/\.[^/.]+$/, "");

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    state.image = img;
                    state.imgW = img.width;
                    state.imgH = img.height;
                    elements.mainImg.src = event.target.result;
                    
                    elements.landing.classList.add('opacity-0');
                    setTimeout(() => {
                        elements.landing.style.display = 'none';
                        elements.main.classList.remove('hidden');
                        elements.fragmentCount.innerText = state.slices;
                        initViewfinder();
                    }, 500);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function initViewfinder() {
            updateRatio(1); 
            state.posX = (state.viewfinderW - state.imgW) / 2;
            state.posY = (state.viewfinderH - state.imgH) / 2;
            updateTransform();
            updatePreviews();
        }

        // --- INPUT SYNC & RESET ---
        function syncInputs(range, input, key, callback) {
            const updateUI = () => {
                input.value = state[key].toFixed(key === 'rotation' ? 1 : (key === 'zoom' ? 2 : 0));
                range.value = state[key];
                callback();
            };

            range.addEventListener('input', (e) => {
                state[key] = parseFloat(e.target.value);
                updateUI();
            });

            // Double Click Reset
            range.addEventListener('dblclick', () => {
                state[key] = DEFAULTS[key];
                updateUI();
            });

            input.addEventListener('change', (e) => {
                let val = parseFloat(e.target.value);
                if (isNaN(val)) val = state[key];
                if (key === 'slices') val = Math.max(2, Math.min(10, val));
                if (key === 'zoom') val = Math.max(0.1, val);
                state[key] = val;
                updateUI();
            });
        }

        syncInputs(elements.sliceRange, elements.sliceInput, 'slices', () => {
            elements.fragmentCount.innerText = state.slices;
            updateRatio(state.ratio);
        });
        syncInputs(elements.rotRange, elements.rotInput, 'rotation', () => {
            updateTransform();
            updatePreviews();
        });
        syncInputs(elements.zoomRange, elements.zoomInput, 'zoom', () => {
            updateTransform();
            updatePreviews();
        });

        // --- RATIO CONTROLS ---
        document.querySelectorAll('.ratio-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active-ratio'));
                btn.classList.add('active-ratio');
                const r = btn.dataset.ratio;
                if (r === 'auto') {
                    updateRatio(state.imgW / (state.imgH / state.slices));
                } else {
                    updateRatio(parseFloat(r));
                }
            });
        });

        elements.flipBtn.addEventListener('click', () => {
            if (state.ratio === 'auto') return;
            updateRatio(1 / state.ratio);
        });

        elements.toggleSafe.addEventListener('change', (e) => {
            elements.safeZones.style.display = e.target.checked ? 'block' : 'none';
        });

        elements.toggleGrid.addEventListener('change', (e) => {
            elements.sliceGuides.style.opacity = e.target.checked ? '1' : '0';
        });

        function updateRatio(ratio) {
            state.ratio = ratio;
            const containerWidth = elements.workspace.clientWidth * 0.8;
            const containerHeight = elements.workspace.clientHeight * 0.8;

            let totalW = containerWidth;
            let singleSliceW = totalW / state.slices;
            let h = singleSliceW / state.ratio;

            if (h > containerHeight) {
                h = containerHeight;
                singleSliceW = h * state.ratio;
                totalW = singleSliceW * state.slices;
            }

            state.viewfinderW = totalW;
            state.viewfinderH = h;
            elements.viewfinder.style.width = totalW + 'px';
            elements.viewfinder.style.height = h + 'px';
            document.documentElement.style.setProperty('--preview-ratio', state.ratio);
            
            updateSliceGuides();
            updateTransform();
            updatePreviews();
        }

        // --- INTERACTION ---
        elements.workspace.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', endDrag);
        elements.workspace.addEventListener('touchstart', (e) => {
            if (e.target.closest('#viewfinder-container')) {
                startDrag(e.touches[0]);
                e.preventDefault();
            }
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (state.isDragging) {
                doDrag(e.touches[0]);
                e.preventDefault();
            }
        }, { passive: false });
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            state.isDragging = true;
            state.startX = e.clientX - state.posX;
            state.startY = e.clientY - state.posY;
        }

        function doDrag(e) {
            if (!state.isDragging) return;
            state.posX = e.clientX - state.startX;
            state.posY = e.clientY - state.startY;
            updateTransform();
            updatePreviews();
        }

        function endDrag() { state.isDragging = false; }

        function updateTransform() {
            elements.mainImg.style.transform = `translate(${state.posX}px, ${state.posY}px) rotate(${state.rotation}deg) scale(${state.zoom})`;
            elements.coordDisplay.innerText = `X:${Math.round(state.posX)} Y:${Math.round(state.posY)}`;
        }

        function updateSliceGuides() {
            elements.sliceGuides.innerHTML = '';
            for (let i = 1; i < state.slices; i++) {
                const line = document.createElement('div');
                line.className = 'h-full border-r border-slate-500/20 border-dashed';
                line.style.width = (100 / state.slices) + '%';
                elements.sliceGuides.appendChild(line);
            }
        }

        // --- PREVIEWS & EXPORT ---
        function renderSliceToCanvas(canvas, index, qualityScale = 1) {
            const sliceViewW = state.viewfinderW / state.slices;
            const sliceViewH = state.viewfinderH;

            canvas.width = sliceViewW * qualityScale;
            canvas.height = sliceViewH * qualityScale;
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#000";
            ctx.fillRect(0,0, canvas.width, canvas.height);

            ctx.save();
            ctx.scale(qualityScale, qualityScale);
            ctx.translate(-index * sliceViewW, 0);
            
            ctx.translate(state.posX + state.imgW/2, state.posY + state.imgH/2);
            ctx.rotate(state.rotation * Math.PI / 180);
            ctx.scale(state.zoom, state.zoom);
            ctx.drawImage(state.image, -state.imgW/2, -state.imgH/2, state.imgW, state.imgH);
            
            ctx.restore();
        }

        function updatePreviews() {
            if (!state.image) return;
            elements.previews.innerHTML = '';
            for (let i = 0; i < state.slices; i++) {
                const thumb = document.createElement('div');
                thumb.className = 'fragment-preview';
                const canvas = document.createElement('canvas');
                canvas.className = 'w-full h-full object-cover';
                renderSliceToCanvas(canvas, i, 0.5); 
                
                const label = document.createElement('div');
                label.className = 'absolute bottom-1 right-1 bg-blue-600 text-white text-[8px] px-2 py-0.5 rounded-full font-black shadow-xl';
                label.innerText = i + 1;
                
                thumb.appendChild(canvas);
                thumb.appendChild(label);
                elements.previews.appendChild(thumb);
            }
        }

        elements.exportBtn.addEventListener('click', async () => {
            const sliceViewW = state.viewfinderW / state.slices;
            const captureScale = 2500 / sliceViewW; 

            for (let i = 0; i < state.slices; i++) {
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = sliceViewW * captureScale;
                exportCanvas.height = state.viewfinderH * captureScale;
                renderSliceToCanvas(exportCanvas, i, captureScale);
                
                const dataUrl = exportCanvas.toDataURL('image/jpeg', 0.95);
                const link = document.createElement('a');
                link.download = `${state.fileName}_${(i+1)}.jpg`;
                link.href = dataUrl;
                link.click();
                
                await new Promise(r => setTimeout(r, 200));
            }
        });

        window.addEventListener('resize', () => {
            if (state.image) updateRatio(state.ratio);
        });
    </script>
</body>
</html>

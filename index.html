<!DOCTYPE html>
<html lang="en" class="dark" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragmenter Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #3b82f6;
            --bg-canvas: #0f172a;
            --bg-panel: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --viewfinder-border: rgba(255, 255, 255, 0.3);
        }

        .light-theme {
            --bg-canvas: #f1f5f9;
            --bg-panel: #ffffff;
            --border: rgba(0, 0, 0, 0.1);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --input-bg: rgba(241, 245, 249, 1);
            --viewfinder-border: rgba(0, 0, 0, 0.2);
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .glass-panel {
            background: var(--bg-panel);
            border-color: var(--border);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .heading-section {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        /* Range Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
            opacity: 0.8;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border: 2px solid var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Aspect Grid */
        .aspect-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .aspect-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 8px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 4px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .aspect-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent);
        }

        /* Steppers */
        .stepper-box {
            background: var(--input-bg);
            border-radius: 4px;
            display: flex;
            align-items: center;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .stepper-input {
            background: transparent;
            color: var(--accent);
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            width: 60px;
            border: none;
            padding: 4px;
        }

        /* Checkbox */
        .custom-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        #workspace {
            background-image: radial-gradient(circle at center, var(--bg-panel) 0%, var(--bg-canvas) 100%);
        }

        .preview-card {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--input-bg);
        }

        .social-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .social-overlay.active { opacity: 1; }

        .grid-line-h, .grid-line-v { position: absolute; background: rgba(255,255,255,0.2); }
        .grid-line-h { width: 100%; height: 1px; }
        .grid-line-v { height: 100%; width: 1px; }

        /* Masks matching theme */
        .theme-mask {
            background-color: var(--bg-canvas);
            transition: background-color 0.3s;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <nav class="h-14 glass-panel border-b flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-blue-500 rounded flex items-center justify-center">
                    <div class="w-2.5 h-2.5 bg-white rounded-sm"></div>
                </div>
                <span class="font-bold text-sm tracking-tight text-[var(--text-primary)]">Fragmenter <span class="text-blue-500 font-black">PRO</span></span>
            </div>
            <div id="file-name-display" class="text-xs font-medium text-[var(--text-secondary)]">No file loaded</div>
        </div>

        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-[var(--text-secondary)]">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <button id="export-btn" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-6 py-2 rounded-lg shadow-lg shadow-blue-500/20 transition-all">EXPORT SLYCES</button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden relative">
        <!-- Sidebar -->
        <aside class="w-80 glass-panel border-r flex flex-col z-30">
            <div class="flex-1 overflow-y-auto p-6 space-y-10 custom-scrollbar">
                
                <!-- GEOMETRY SECTION -->
                <section>
                    <h3 class="heading-section">Geometry</h3>
                    
                    <div class="space-y-6">
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <label class="text-xs font-semibold text-[var(--text-secondary)]">Slice Count</label>
                                <div class="stepper-box">
                                    <input type="number" id="slice-input" min="1" max="15" value="3" class="stepper-input">
                                </div>
                            </div>
                            <input type="range" id="slice-range" min="1" max="15" value="3">
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <label class="text-xs font-semibold text-[var(--text-secondary)] text-nowrap">Rotation (deg)</label>
                                <div class="stepper-box">
                                    <input type="number" id="rot-input" step="0.1" value="0.0" class="stepper-input">
                                </div>
                            </div>
                            <input type="range" id="rot-range" min="-45" max="45" step="0.1" value="0">
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <label class="text-xs font-semibold text-[var(--text-secondary)]">Zoom</label>
                                <div class="stepper-box">
                                    <input type="number" id="zoom-input" step="0.01" value="1.00" class="stepper-input">
                                </div>
                            </div>
                            <input type="range" id="zoom-range" min="0.1" max="5" step="0.01" value="1">
                        </div>
                    </div>
                </section>

                <!-- FRAME ASPECT SECTION -->
                <section>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="heading-section !mb-0">Frame Aspect</h3>
                        <button id="flip-ratio-btn" class="text-[var(--text-secondary)] hover:text-blue-500 transition-colors">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
                        </button>
                    </div>
                    <div class="aspect-grid">
                        <button class="ratio-btn aspect-btn" data-ratio="0.8">4:5</button>
                        <button class="ratio-btn aspect-btn" data-ratio="1">1:1</button>
                        <button class="ratio-btn aspect-btn" data-ratio="1.777">16:9</button>
                        <button class="ratio-btn aspect-btn active" data-ratio="0.5625">9:16</button>
                        <button id="auto-compose-btn" class="aspect-btn col-span-2 border-blue-500/50 text-blue-500 hover:bg-blue-500/10">AUTO FIT</button>
                    </div>
                </section>

                <!-- OVERLAY SECTION -->
                <section>
                    <h3 class="heading-section">Overlay</h3>
                    <div class="space-y-6">
                        <div class="relative">
                            <select id="social-preview-select" class="w-full bg-[var(--input-bg)] border border-[var(--border)] rounded-lg p-3 text-sm text-[var(--text-primary)] focus:outline-none focus:border-blue-500 appearance-none">
                                <option value="none">None</option>
                                <option value="instagram">Instagram Post</option>
                                <option value="tiktok" selected>TikTok Fullscreen</option>
                                <option value="reels">Instagram Reels</option>
                            </select>
                            <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-[var(--text-secondary)]">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <label class="flex items-center justify-between group cursor-pointer">
                                <span class="text-sm font-medium text-[var(--text-secondary)] group-hover:text-[var(--text-primary)] transition-colors">Safe Zones</span>
                                <input type="checkbox" id="toggle-safe" class="custom-checkbox">
                            </label>
                            <label class="flex items-center justify-between group cursor-pointer">
                                <span class="text-sm font-medium text-[var(--text-secondary)] group-hover:text-[var(--text-primary)] transition-colors">Slices</span>
                                <input type="checkbox" id="toggle-grid" checked class="custom-checkbox">
                            </label>
                            <label class="flex items-center justify-between group cursor-pointer">
                                <span class="text-sm font-medium text-[var(--text-secondary)] group-hover:text-[var(--text-primary)] transition-colors">Rule of Thirds</span>
                                <input type="checkbox" id="toggle-thirds" class="custom-checkbox">
                            </label>
                        </div>
                    </div>
                </section>
            </div>
        </aside>

        <!-- Main Canvas -->
        <main id="workspace" class="flex-1 relative flex items-center justify-center p-12 select-none overflow-hidden">
            <div id="viewfinder-container" class="relative z-10">
                <!-- Outer Masks -->
                <div id="top-mask" class="theme-mask absolute w-[5000px] h-[3000px] left-[-2500px] bottom-full opacity-90 border-b border-[var(--viewfinder-border)]"></div>
                <div id="bottom-mask" class="theme-mask absolute w-[5000px] h-[3000px] left-[-2500px] top-full opacity-90 border-t border-[var(--viewfinder-border)]"></div>
                <div id="left-mask" class="theme-mask absolute h-[5000px] w-[3000px] top-[-2500px] right-full opacity-90 border-r border-[var(--viewfinder-border)]"></div>
                <div id="right-mask" class="theme-mask absolute h-[5000px] w-[3000px] top-[-2500px] left-full opacity-90 border-l border-[var(--viewfinder-border)]"></div>
                
                <div id="viewfinder" class="relative bg-black overflow-hidden shadow-2xl">
                    <img id="main-image" src="" class="absolute max-w-none pointer-events-none select-none origin-center transition-transform duration-75">
                    <div id="slice-guides" class="absolute inset-0 flex pointer-events-none"></div>
                    
                    <div id="thirds-guides" class="absolute inset-0 hidden pointer-events-none">
                        <div class="grid-line-h top-1/3"></div><div class="grid-line-h top-2/3"></div>
                        <div class="grid-line-v left-1/3"></div><div class="grid-line-v left-2/3"></div>
                    </div>

                    <div id="overlay-instagram" class="social-overlay">
                         <div class="absolute top-0 w-full p-4 flex items-center justify-between bg-gradient-to-b from-black/60 to-transparent">
                            <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-white/20"></div><div class="text-xs font-bold text-white">username</div></div>
                        </div>
                    </div>
                    <div id="overlay-tiktok" class="social-overlay">
                        <div class="absolute right-4 bottom-20 flex flex-col items-center gap-6">
                            <div class="w-10 h-10 rounded-full border-2 border-white bg-white/10"></div>
                            <div class="flex flex-col items-center gap-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span class="text-[10px] text-white">42k</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Preview Column -->
        <aside class="w-64 glass-panel border-l flex flex-col z-30">
            <div class="p-4 border-b border-[var(--border)] flex items-center justify-between">
                <span class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-widest">Fragments</span>
                <span id="fragment-count" class="text-[10px] font-bold text-blue-500">0 ITEMS</span>
            </div>
            <div id="previews-container" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar"></div>
        </aside>
    </div>

    <!-- Upload Landing -->
    <div id="landing-zone" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-950">
        <label for="file-upload" class="flex flex-col items-center cursor-pointer group px-10 py-16 rounded-3xl border-2 border-dashed border-white/10 hover:border-blue-500/50 hover:bg-blue-500/5 transition-all">
            <div class="w-20 h-20 rounded-2xl bg-blue-600 flex items-center justify-center shadow-2xl shadow-blue-600/30 group-hover:scale-110 transition-transform">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <h2 class="mt-8 text-2xl font-bold text-white">Import Panorama</h2>
            <p class="text-slate-400 mt-2 text-sm">Drag and drop or click to browse</p>
            <input type="file" id="file-upload" class="hidden" accept="image/*">
        </label>
    </div>

    <script>
        const state = {
            image: null, fileName: 'panorama',
            imgW: 0, imgH: 0, posX: 0, posY: 0, zoom: 1, rotation: 0,
            slices: 3, ratio: 0.5625, isDragging: false,
            startX: 0, startY: 0, viewfinderW: 0, viewfinderH: 0
        };

        const elements = {
            html: document.getElementById('root-html'),
            landing: document.getElementById('landing-zone'),
            fileInput: document.getElementById('file-upload'),
            mainImg: document.getElementById('main-image'),
            viewfinder: document.getElementById('viewfinder'),
            workspace: document.getElementById('workspace'),
            sliceRange: document.getElementById('slice-range'),
            sliceInput: document.getElementById('slice-input'),
            rotRange: document.getElementById('rot-range'),
            rotInput: document.getElementById('rot-input'),
            zoomRange: document.getElementById('zoom-range'),
            zoomInput: document.getElementById('zoom-input'),
            sliceGuides: document.getElementById('slice-guides'),
            thirdsGuides: document.getElementById('thirds-guides'),
            previews: document.getElementById('previews-container'),
            toggleGrid: document.getElementById('toggle-grid'),
            toggleThirds: document.getElementById('toggle-thirds'),
            exportBtn: document.getElementById('export-btn'),
            autoCompose: document.getElementById('auto-compose-btn'),
            socialPreview: document.getElementById('social-preview-select'),
            flipBtn: document.getElementById('flip-ratio-btn'),
            themeToggle: document.getElementById('theme-toggle')
        };

        // Initialize Theme Logic
        elements.themeToggle.onclick = () => {
            const isLight = elements.html.classList.toggle('light-theme');
            elements.html.classList.toggle('dark', !isLight);
            document.getElementById('theme-icon').innerHTML = isLight 
                ? '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>' 
                : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        };

        function loadImage(url) {
            const img = new Image();
            img.onload = () => {
                state.image = img;
                state.imgW = img.width;
                state.imgH = img.height;
                elements.mainImg.src = url;
                elements.landing.style.display = 'none';
                
                // Initial update
                updateRatio(state.ratio);
                
                // Trigger Auto Fit immediately on upload
                autoFit();
                
                // Initial overlay state
                updateOverlayVisibility(elements.socialPreview.value);
            };
            img.src = url;
        }

        elements.fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => loadImage(ev.target.result);
                reader.readAsDataURL(file);
                document.getElementById('file-name-display').innerText = file.name;
            }
        };

        function sync(range, input, key, cb) {
            range.oninput = () => { state[key] = parseFloat(range.value); input.value = state[key].toFixed(key === 'slices' ? 0 : (key === 'rotation' ? 1 : 2)); cb(); };
            input.onchange = () => { state[key] = parseFloat(input.value) || 0; range.value = state[key]; cb(); };
        }
        sync(elements.sliceRange, elements.sliceInput, 'slices', () => updateRatio(state.ratio));
        sync(elements.rotRange, elements.rotInput, 'rotation', () => { updateTransform(); updatePreviews(); });
        sync(elements.zoomRange, elements.zoomInput, 'zoom', () => { updateTransform(); updatePreviews(); });

        function updateRatio(ratio) {
            state.ratio = ratio;
            const limitW = elements.workspace.clientWidth * 0.8;
            const limitH = elements.workspace.clientHeight * 0.8;
            let tw = limitW;
            let h = (tw / state.slices) / state.ratio;
            if (h > limitH) { h = limitH; tw = (h * state.ratio) * state.slices; }
            state.viewfinderW = tw; state.viewfinderH = h;
            elements.viewfinder.style.width = `${tw}px`; elements.viewfinder.style.height = `${h}px`;
            updateSliceGuides(); updateTransform(); updatePreviews();
        }

        function updateTransform() {
            elements.mainImg.style.transform = `translate(${state.posX}px, ${state.posY}px) scale(${state.zoom}) rotate(${state.rotation}deg)`;
        }

        function updateSliceGuides() {
            elements.sliceGuides.innerHTML = '';
            for (let i = 1; i < state.slices; i++) {
                const g = document.createElement('div');
                g.className = 'h-full border-r border-white/20';
                g.style.width = `${100 / state.slices}%`;
                elements.sliceGuides.appendChild(g);
            }
            document.getElementById('fragment-count').innerText = `${state.slices} ITEMS`;
        }

        function autoFit() {
            if (!state.image) return;
            // Fits the height of the image to the height of the viewfinder
            state.zoom = state.viewfinderH / state.imgH;
            state.posX = (state.viewfinderW - state.imgW * state.zoom) / 2 / state.zoom;
            state.posY = 0;
            state.rotation = 0;
            
            // Sync UI inputs
            elements.zoomRange.value = state.zoom;
            elements.zoomInput.value = state.zoom.toFixed(2);
            elements.rotRange.value = 0;
            elements.rotInput.value = "0.0";
            
            updateTransform(); 
            updatePreviews();
        }

        elements.workspace.onmousedown = (e) => {
            if (!state.image) return;
            state.isDragging = true;
            state.startX = e.clientX - state.posX * state.zoom;
            state.startY = e.clientY - state.posY * state.zoom;
        };
        window.onmousemove = (e) => {
            if (!state.isDragging) return;
            state.posX = (e.clientX - state.startX) / state.zoom;
            state.posY = (e.clientY - state.startY) / state.zoom;
            updateTransform(); updatePreviews();
        };
        window.onmouseup = () => state.isDragging = false;

        document.querySelectorAll('.ratio-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateRatio(parseFloat(btn.dataset.ratio));
            };
        });
        elements.flipBtn.onclick = () => updateRatio(1 / state.ratio);
        elements.autoCompose.onclick = autoFit;

        function updateOverlayVisibility(val) {
            document.querySelectorAll('.social-overlay').forEach(el => el.classList.remove('active'));
            if (val === 'reels' || val === 'tiktok') document.getElementById('overlay-tiktok').classList.add('active');
            else if (val !== 'none') document.getElementById(`overlay-${val}`).classList.add('active');
        }

        elements.socialPreview.onchange = (e) => updateOverlayVisibility(e.target.value);

        function updatePreviews() {
            if (!state.image) return;
            elements.previews.innerHTML = '';
            const sw = state.viewfinderW / state.slices;
            for (let i = 0; i < state.slices; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 200; canvas.height = (200 / state.ratio);
                const ctx = canvas.getContext('2d');
                const s = 200 / sw;
                ctx.scale(s, s);
                ctx.translate(-i * sw, 0);
                ctx.translate(state.viewfinderW/2, state.viewfinderH/2);
                ctx.rotate(state.rotation * Math.PI / 180);
                ctx.scale(state.zoom, state.zoom);
                ctx.translate(state.posX, state.posY);
                ctx.drawImage(state.image, -state.imgW/2, -state.imgH/2);
                
                const card = document.createElement('div');
                card.className = 'preview-card group relative';
                card.innerHTML = `<div class="absolute top-2 left-2 bg-blue-600 text-[8px] font-bold px-1.5 py-0.5 rounded text-white z-10">${i+1}</div>`;
                card.appendChild(canvas);
                elements.previews.appendChild(card);
            }
        }

        elements.exportBtn.onclick = async () => {
            const sw = state.viewfinderW / state.slices;
            const targetWidth = 1080; // Instagram standard
            const scale = targetWidth / sw;
            
            for (let i = 0; i < state.slices; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = targetWidth; 
                canvas.height = (state.viewfinderH * scale);
                const ctx = canvas.getContext('2d');
                
                ctx.scale(scale, scale);
                ctx.translate(-i * sw, 0);
                ctx.translate(state.viewfinderW/2, state.viewfinderH/2);
                ctx.rotate(state.rotation * Math.PI / 180);
                ctx.scale(state.zoom, state.zoom);
                ctx.translate(state.posX, state.posY);
                ctx.drawImage(state.image, -state.imgW/2, -state.imgH/2);
                
                const a = document.createElement('a');
                a.download = `fragment_${i+1}.jpg`;
                a.href = canvas.toDataURL('image/jpeg', 0.95);
                a.click();
                await new Promise(r => setTimeout(r, 200));
            }
        };

        elements.toggleGrid.onclick = (e) => elements.sliceGuides.style.opacity = e.target.checked ? '1' : '0';
        elements.toggleThirds.onclick = (e) => elements.thirdsGuides.style.display = e.target.checked ? 'block' : 'none';
        window.onresize = () => state.image && updateRatio(state.ratio);
    </script>
</body>
</html>

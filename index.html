<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanoSplitter Cyberpunk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        cyber: '#00ff41',
                        zinc: { 950: '#050505' } 
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #00ff41; font-family: monospace; }
        .canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: relative;
            background: radial-gradient(circle, #001a00 0%, #000 100%);
            overflow: hidden;
        }
        .canvas-container:active { cursor: grabbing; }
        
        #view {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #00ff41; }
        input[type=range] { accent-color: #00ff41; }
        
        .ratio-opt.active {
            background-color: #00ff41;
            color: #000;
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden flex flex-col">

    <!-- Cyberpunk Header -->
    <nav class="border-b border-cyber/30 bg-black px-6 py-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-transparent border-2 border-cyber flex items-center justify-center font-bold text-cyber shadow-[0_0_10px_#00ff41]">
                PS
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">Pano<span class="text-white">Splitter</span></h1>
        </div>
        <button id="uploadTrigger" class="px-4 py-2 border border-cyber text-[10px] font-bold uppercase tracking-widest hover:bg-cyber hover:text-black transition-all">
            Load_System_File
        </button>
    </nav>

    <!-- Upload Overlay -->
    <div id="landing" class="flex-1 flex flex-col items-center justify-center p-6 text-center">
        <div id="dropZone" class="border border-cyber/20 p-20 hover:border-cyber transition-all cursor-pointer group bg-zinc-950/50">
            <p class="text-cyber/50 group-hover:text-cyber mb-4">[ INSERT_PANORAMA ]</p>
            <p class="text-[10px] uppercase tracking-[0.4em]">Drag or Click to Initialize</p>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
    </div>

    <!-- Main Workspace -->
    <main id="workspace" class="hidden flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Controls -->
        <aside class="w-full lg:w-80 border-r border-cyber/20 bg-black flex flex-col shrink-0">
            <div class="p-6 space-y-10 overflow-y-auto custom-scrollbar">
                
                <section>
                    <div class="flex justify-between text-[10px] mb-4 uppercase tracking-widest font-bold">
                        <span>Splits</span>
                        <span id="valSlices">3</span>
                    </div>
                    <input type="range" id="inputSlices" min="2" max="10" value="3" class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                </section>

                <section>
                    <label class="text-[10px] mb-4 block uppercase tracking-widest font-bold">Ratio</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="ratio-opt py-2 border border-cyber/30 text-[10px] hover:border-cyber active" data-r="0.8">4:5</button>
                        <button class="ratio-opt py-2 border border-cyber/30 text-[10px] hover:border-cyber" data-r="1">1:1</button>
                        <button class="ratio-opt py-2 border border-cyber/30 text-[10px] hover:border-cyber" data-r="1.777">16:9</button>
                        <button class="ratio-opt py-2 border border-cyber/30 text-[10px] hover:border-cyber" data-r="orig">AUTO</button>
                    </div>
                </section>

                <section>
                    <div class="flex justify-between text-[10px] mb-4 uppercase tracking-widest font-bold">
                        <span>Rotate</span>
                        <span id="valRot">0°</span>
                    </div>
                    <input type="range" id="inputRot" min="-15" max="15" step="0.5" value="0" class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                </section>

            </div>

            <div class="mt-auto p-6 border-t border-cyber/20 bg-black">
                <button id="btnDownload" class="w-full py-4 bg-cyber text-black font-black uppercase text-xs tracking-widest hover:shadow-[0_0_20px_#00ff41] transition-all active:scale-95">
                    Compile & Export
                </button>
            </div>
        </aside>

        <!-- Preview Viewport -->
        <div class="flex-1 bg-black relative overflow-hidden flex flex-col">
            <div id="canvasContainer" class="canvas-container">
                <canvas id="view"></canvas>
            </div>
            
            <div class="absolute bottom-6 left-6 text-[9px] text-cyber/40 uppercase tracking-widest font-mono pointer-events-none">
                System_Status: <span class="text-cyber">Active</span> // Drag_To_Adjust
            </div>
        </div>

        <!-- Right Side Preview -->
        <aside class="hidden xl:flex w-64 border-l border-cyber/20 bg-zinc-950 flex-col overflow-hidden">
            <div class="p-4 border-b border-cyber/20 text-[9px] uppercase tracking-widest text-cyber/60">Fragment_Output</div>
            <div id="grid" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar"></div>
        </aside>
    </main>

    <script>
        let img = null, name = "pano", offY = 0, rot = 0, slices = 3, ratio = 0.8;
        let isDrag = false, startY = 0;

        const canvas = document.getElementById('view');
        const ctx = canvas.getContext('2d');

        // Initial Setup
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            name = file.name.replace(/\.[^/.]+$/, "");
            const reader = new FileReader();
            reader.onload = (re) => {
                const i = new Image();
                i.onload = () => {
                    img = i;
                    document.getElementById('landing').classList.add('hidden');
                    document.getElementById('workspace').classList.remove('hidden');
                    offY = 0; // Reset offset on new image
                    update();
                };
                i.src = re.target.result;
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('uploadTrigger').onclick = () => document.getElementById('fileInput').click();

        // UI Events
        document.getElementById('inputSlices').oninput = (e) => {
            slices = parseInt(e.target.value);
            document.getElementById('valSlices').textContent = slices;
            update();
        };

        document.getElementById('inputRot').oninput = (e) => {
            rot = parseFloat(e.target.value);
            document.getElementById('valRot').textContent = rot + '°';
            update();
        };

        document.querySelectorAll('.ratio-opt').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.ratio-opt').forEach(el => el.classList.remove('active', 'bg-cyber', 'text-black'));
                b.classList.add('active');
                ratio = b.dataset.r === 'orig' ? 'orig' : parseFloat(b.dataset.r);
                update();
            };
        });

        function update() {
            if (!img) return;
            
            // Calculate slice dimensions
            const sw = img.width / slices;
            const sh = ratio === 'orig' ? img.height : sw / ratio;
            
            renderMain(sw, sh);
            renderFragments(sw, sh);
        }

        function renderMain(sw, sh) {
            // We use a fixed-height canvas to prevent jumps during ratio changes
            // The "Virtual Workspace" height is larger than the image to allow dragging
            const workspaceHeight = Math.max(img.width, img.height) * 2;
            canvas.width = img.width;
            canvas.height = workspaceHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // 1. The Viewport Frame is anchored exactly in the center of the canvas
            const frameTop = cy - sh / 2;
            const frameBottom = cy + sh / 2;

            // 2. Draw the actual image behind the frame with current rotation and Y-offset
            ctx.save();
            ctx.translate(cx, cy + offY);
            ctx.rotate(rot * Math.PI / 180);
            ctx.drawImage(img, -img.width / 2, -img.height / 2);
            ctx.restore();

            // 3. Dark Overlay (Letterboxing)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            // Top box
            ctx.fillRect(0, 0, canvas.width, frameTop);
            // Bottom box
            ctx.fillRect(0, frameBottom, canvas.width, canvas.height);

            // 4. Cyber Viewfinder Border
            ctx.strokeStyle = '#00ff41';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, frameTop, canvas.width, sh);

            // 5. Slice Guides
            ctx.setLineDash([15, 10]);
            ctx.strokeStyle = 'rgba(0, 255, 65, 0.4)';
            ctx.lineWidth = 2;
            for(let i = 1; i < slices; i++) {
                const x = i * sw;
                ctx.beginPath();
                ctx.moveTo(x, frameTop);
                ctx.lineTo(x, frameBottom);
                ctx.stroke();
            }
            ctx.setLineDash([]); // Reset
        }

        function renderFragments(sw, sh) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for(let i = 0; i < slices; i++) {
                const tmp = document.createElement('canvas');
                tmp.width = sw;
                tmp.height = sh;
                const tctx = tmp.getContext('2d');
                
                tctx.save();
                // We recreate the exact framing from the main preview
                tctx.translate(-i * sw, sh / 2);
                tctx.translate(img.width / 2, offY);
                tctx.rotate(rot * Math.PI / 180);
                tctx.drawImage(img, -img.width / 2, -img.height / 2);
                tctx.restore();

                const wrapper = document.createElement('div');
                wrapper.className = "relative group cursor-zoom-in";
                
                const imgEl = document.createElement('img');
                imgEl.src = tmp.toDataURL('image/jpeg', 0.8);
                imgEl.className = "w-full border border-cyber/20 hover:border-cyber/60 transition-all shadow-lg";
                
                const label = document.createElement('div');
                label.className = "absolute top-2 left-2 bg-black/80 border border-cyber/30 px-1 text-[8px] text-cyber";
                label.textContent = `SLICE_${i+1}`;
                
                wrapper.appendChild(label);
                wrapper.appendChild(imgEl);
                grid.appendChild(wrapper);
            }
        }

        // Draggable Interaction
        canvas.addEventListener('mousedown', (e) => {
            isDrag = true;
            startY = e.clientY - offY;
        });

        window.addEventListener('mousemove', (e) => {
            if (isDrag) {
                offY = e.clientY - startY;
                update();
            }
        });

        window.addEventListener('mouseup', () => {
            isDrag = false;
        });

        // Download Logic
        document.getElementById('btnDownload').onclick = async () => {
            const btn = document.getElementById('btnDownload');
            const originalText = btn.textContent;
            btn.textContent = "PROCESSING...";
            btn.disabled = true;

            try {
                const zip = new JSZip();
                const sw = img.width / slices;
                const sh = ratio === 'orig' ? img.height : sw / ratio;

                for(let i = 0; i < slices; i++) {
                    const out = document.createElement('canvas');
                    out.width = sw;
                    out.height = sh;
                    const octx = out.getContext('2d');
                    
                    octx.save();
                    octx.translate(-i * sw, sh / 2);
                    octx.translate(img.width / 2, offY);
                    octx.rotate(rot * Math.PI / 180);
                    octx.drawImage(img, -img.width / 2, -img.height / 2);
                    octx.restore();
                    
                    zip.file(`${name}_${i+1}.jpg`, out.toDataURL('image/jpeg', 0.95).split(',')[1], {base64: true});
                }
                
                const blob = await zip.generateAsync({type: "blob"});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${name}_CAROUSEL.zip`;
                a.click();
            } catch (err) {
                console.error(err);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
